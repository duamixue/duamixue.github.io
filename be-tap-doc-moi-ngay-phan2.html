<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bé Tập Đọc Cùng Biển Xanh 🌊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sand:#FFF6E5;
    --coral:#FF7A6B;
    --sea:#2E9CC7;
    --seaLight:#5FC6E8;
    --gold:#FFC93D;
    --violet:#9B7FE0;
    --ink:#243B4A;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;
    background:
      radial-gradient(circle at 8% 10%, #FFE9C2 0%, transparent 40%),
      radial-gradient(circle at 92% 18%, #C9EEF7 0%, transparent 44%),
      radial-gradient(circle at 85% 90%, #D6F0E4 0%, transparent 42%),
      var(--sand);
    font-family:'Quicksand',sans-serif;color:var(--ink);
    padding:20px 14px 60px;overflow-x:hidden;
  }
  .sky-deco{position:fixed;font-size:34px;opacity:.55;pointer-events:none;animation:float 7s ease-in-out infinite;z-index:0;}
  .d1{top:6%;left:4%;} .d2{top:14%;right:6%;animation-delay:1.5s;font-size:28px;}
  .d3{bottom:8%;left:8%;animation-delay:3s;font-size:30px;} .d4{bottom:16%;right:4%;animation-delay:2s;}
  @keyframes float{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-16px) rotate(6deg);}}

  header{text-align:center;max-width:720px;margin:0 auto 18px;position:relative;z-index:1;}
  .mascot{font-size:56px;display:inline-block;animation:wiggle 2.6s ease-in-out infinite;}
  @keyframes wiggle{0%,100%{transform:rotate(-6deg);}50%{transform:rotate(6deg);}}
  h1{font-family:'Baloo 2',cursive;font-size:clamp(28px,6vw,42px);color:var(--coral);margin:6px 0 4px;text-shadow:2px 2px 0 #FFE1B8;}
  header p{font-size:18px;font-weight:600;color:#4E7285;margin:0;}

  .streak-bar{
    max-width:760px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;
    gap:16px;flex-wrap:wrap;font-family:'Baloo 2',cursive;font-weight:700;color:#1F6E8C;
    background:#DFF3FA;border-radius:999px;padding:10px 22px;box-shadow:0 3px 0 #BFE6F2;
    position:relative;z-index:1;width:fit-content;
  }
  .streak-bar span.sep{color:#9ED4E6;}

  .status-note{text-align:center;font-size:14px;color:#8FA9B6;max-width:600px;margin:0 auto 10px;position:relative;z-index:1;}

  .path-wrap{max-width:760px;margin:0 auto 26px;position:relative;z-index:1;}
  .path{display:flex;gap:10px;overflow-x:auto;padding:10px 6px 16px;scrollbar-width:thin;}
  .stone{
    flex:0 0 auto;width:78px;height:92px;border-radius:22px;border:none;background:var(--card);
    box-shadow:0 4px 0 #D9EEF5;cursor:pointer;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:4px;font-family:'Baloo 2',cursive;font-weight:700;color:#7FA0AE;
    transition:transform .15s ease, box-shadow .15s ease;position:relative;
  }
  .stone .ic{font-size:22px;} .stone .num{font-size:13px;}
  .stone:hover{transform:translateY(-3px);}
  .stone.active{background:linear-gradient(160deg,var(--seaLight),var(--sea));color:#fff;box-shadow:0 4px 0 #1F7B9E;transform:translateY(-3px) scale(1.04);}
  .stone.done::after{
    content:"✓";position:absolute;top:-8px;right:-6px;background:#3DBFA0;color:#fff;
    width:22px;height:22px;border-radius:50%;font-size:13px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 4px rgba(0,0,0,.15);
  }

  .card{
    max-width:760px;margin:0 auto;background:var(--card);border-radius:32px;padding:clamp(22px,5vw,44px);
    box-shadow:0 14px 0 #E3F2F8, 0 18px 30px rgba(60,130,160,.16);position:relative;z-index:1;border:4px solid #EAF7FB;
  }

  .art-wrap{display:flex;justify-content:center;margin-bottom:14px;}
  .art-wrap svg{width:150px;height:150px;filter:drop-shadow(0 6px 0 rgba(0,0,0,.06));}

  .badge{display:inline-block;font-family:'Baloo 2',cursive;font-weight:700;font-size:15px;padding:6px 18px;border-radius:999px;color:#fff;margin-bottom:14px;}
  .badge.truyen{background:var(--coral);} .badge.tho{background:var(--violet);} .badge.cadao{background:var(--sea);}
  .card h2{font-family:'Baloo 2',cursive;font-size:clamp(24px,5vw,34px);margin:0 0 16px;color:var(--ink);text-align:center;}

  .listen-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:22px;justify-content:center;}
  .pill-btn{
    font-family:'Baloo 2',cursive;font-weight:700;font-size:15px;border:none;border-radius:999px;
    padding:10px 18px;cursor:pointer;color:#fff;box-shadow:0 3px 0 rgba(0,0,0,.15);
    transition:transform .1s ease;display:inline-flex;align-items:center;gap:6px;
  }
  .pill-btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.15);}
  .pill-btn.listen-all{background:var(--coral);} .pill-btn.stop{background:#9FB6C0;}
  .pill-btn.mini{background:#E4F5FB;color:#1F6E8C;box-shadow:0 2px 0 #C7E7F1;font-size:20px;padding:6px 10px;border-radius:12px;}

  .sentence-row{
    display:flex;align-items:flex-start;gap:10px;font-size:clamp(20px,4vw,25px);line-height:1.7;
    font-weight:600;color:#25404F;padding:8px 10px;border-radius:14px;margin-bottom:6px;transition:background .25s ease;
  }
  .sentence-row.active{background:#D6F0FA;}
  .sentence-row .txt{flex:1;}
  .sentence-row .txt.flash{animation:flashword 1s ease;}
  @keyframes flashword{0%,100%{background:transparent;}30%{background:#B7F0DA;}}

  .section-title{font-family:'Baloo 2',cursive;font-size:19px;color:var(--ink);margin:26px 0 10px;display:flex;align-items:center;gap:8px;}
  .chip-row{display:flex;flex-wrap:wrap;gap:10px;}
  .chip{
    font-family:'Baloo 2',cursive;font-weight:700;font-size:17px;background:#EAF2FF;color:#3457A0;
    border:none;border-radius:14px;padding:9px 16px;cursor:pointer;box-shadow:0 3px 0 #CBDBF5;
    transition:transform .1s ease, background .2s ease;
  }
  .chip:active{transform:translateY(2px);}
  .chip.found{background:#D6F5E8;color:#1F8A66;box-shadow:0 3px 0 #A9E6CB;}
  .chip.fast{background:#FFE9DC;color:#C1592F;box-shadow:0 3px 0 #F3C7AE;}

  .quiz-box{margin-top:26px;background:#EAF7FB;border-radius:20px;padding:20px;border:2px dashed #B9E3F0;display:none;}
  .quiz-box.show{display:block;}
  .quiz-q{font-family:'Baloo 2',cursive;font-size:19px;color:#1F6E8C;margin-bottom:12px;}
  .quiz-opt{
    font-family:'Baloo 2',cursive;font-weight:700;font-size:17px;background:#fff;color:#1F6E8C;
    border:2px solid #B9E3F0;border-radius:14px;padding:10px 18px;cursor:pointer;margin:4px 8px 4px 0;
    transition:transform .1s ease;
  }
  .quiz-opt:active{transform:translateY(2px);}
  .quiz-opt.correct{background:#D6F5E8;border-color:#7FD9B4;color:#1F8A66;}
  .quiz-opt.wrong{background:#FFE1E1;border-color:#FFAFAF;color:#C13F3F;animation:shake .4s ease;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
  .quiz-fb{font-family:'Baloo 2',cursive;font-weight:700;margin-top:10px;font-size:16px;min-height:20px;}

  .actions{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-top:30px;}
  button.big{
    font-family:'Baloo 2',cursive;font-size:19px;font-weight:700;padding:14px 26px;border-radius:20px;
    border:none;cursor:pointer;color:#fff;box-shadow:0 5px 0 rgba(0,0,0,.15);transition:transform .1s ease;
  }
  button.big:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(0,0,0,.15);}
  button.big:disabled{opacity:.4;cursor:default;}
  #prevBtn{background:#9FB6C0;} #doneBtn{background:#3DBFA0;} #nextBtn{background:var(--coral);}

  .cheer{position:relative;text-align:center;font-family:'Baloo 2',cursive;font-size:20px;color:#3DBFA0;min-height:28px;margin-top:14px;opacity:0;transition:opacity .3s ease;}
  .cheer.show{opacity:1;}
  .point-float{
    position:absolute;left:50%;top:-6px;transform:translateX(-50%);font-family:'Baloo 2',cursive;
    font-weight:800;font-size:20px;color:#E0A100;animation:floatUp 1.3s ease forwards;pointer-events:none;
  }
  @keyframes floatUp{0%{opacity:0;transform:translate(-50%,10px);}30%{opacity:1;}100%{opacity:0;transform:translate(-50%,-38px);}}

  .confetti-piece{position:fixed;top:-20px;width:10px;height:14px;border-radius:2px;z-index:50;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(105vh) rotate(540deg);opacity:.9;}}

  .overlay{position:fixed;inset:0;background:rgba(36,59,74,.55);display:none;align-items:center;justify-content:center;z-index:60;padding:20px;}
  .overlay.show{display:flex;}
  .badge-card{background:#fff;border-radius:28px;padding:36px 30px;text-align:center;max-width:360px;box-shadow:0 20px 40px rgba(0,0,0,.25);border:5px solid var(--gold);}
  .badge-card .medal{font-size:70px;animation:wiggle 1.6s ease-in-out infinite;}
  .badge-card h3{font-family:'Baloo 2',cursive;color:var(--coral);font-size:26px;margin:10px 0 6px;}
  .badge-card p{font-size:17px;color:#4E7285;margin:0 0 18px;font-weight:600;}
  .badge-card button{font-family:'Baloo 2',cursive;font-weight:700;font-size:17px;background:#3DBFA0;color:#fff;border:none;border-radius:16px;padding:12px 24px;cursor:pointer;box-shadow:0 4px 0 #2C948F;}

  footer{text-align:center;margin-top:34px;font-size:15px;color:#8FA9B6;position:relative;z-index:1;}
  .copyright{margin-top:6px;font-size:13px;color:#B7CBD3;}
  @media (prefers-reduced-motion: reduce){.mascot,.sky-deco{animation:none;}}

  .music-toggle{
    position:fixed;top:16px;right:16px;z-index:40;
    width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;
    background:var(--card);box-shadow:0 4px 0 #D9EEF5, 0 6px 14px rgba(0,0,0,.12);
    font-size:24px;display:flex;align-items:center;justify-content:center;
    transition:transform .15s ease;
  }
  .music-toggle:active{transform:translateY(2px);}
  .music-toggle.playing{animation:spin 3.5s linear infinite;background:linear-gradient(160deg,var(--seaLight),var(--sea));}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
</style>
</head>
<body>

<button class="music-toggle" id="musicBtn" title="Bật/tắt nhạc nền">🎵</button>
<audio id="bgMusic" src="Beethoven-Moonlight-64kbps.mp3" loop preload="none"></audio>

<div class="sky-deco d1">☁️</div>
<div class="sky-deco d2">🐚</div>
<div class="sky-deco d3">🌊</div>
<div class="sky-deco d4">⭐</div>

<header>
  <span class="mascot">🦀</span>
  <h1>Bé Tập Đọc Cùng Biển Xanh</h1>
  <p>Cùng Cua Càng khám phá đại dương qua từng trang sách mùa hè!</p>
</header>

<div class="streak-bar" id="streakBar"></div>
<p class="status-note" id="voiceNote"></p>

<div class="path-wrap"><div class="path" id="path"></div></div>

<div class="card">
  <div class="art-wrap" id="artWrap"></div>
  <span class="badge" id="badge"></span>
  <h2 id="title"></h2>

  <div class="listen-row">
    <button class="pill-btn listen-all" id="listenAllBtn">🔊 Nghe cô đọc</button>
    <button class="pill-btn stop" id="stopBtn">⏹ Dừng</button>
  </div>

  <div id="story"></div>
  <div id="vocabSection"></div>
  <div id="fastSection"></div>

  <div class="quiz-box" id="quizBox">
    <div class="quiz-q" id="quizQ"></div>
    <div id="quizOpts"></div>
    <div class="quiz-fb" id="quizFb"></div>
  </div>

  <div class="actions">
    <button class="big" id="prevBtn">⬅ Hôm qua</button>
    <button class="big" id="doneBtn">✅ Đọc xong rồi!</button>
    <button class="big" id="nextBtn">Ngày mai ➡</button>
  </div>
  <div class="cheer" id="cheer"></div>
</div>

<footer>
  🌊 Đọc chậm, đọc rõ từng chữ — Cua Càng tin bé làm được! 🌊
  <div class="copyright">© Dừa &amp; Mixue — Mùa hè, 2026</div>
</footer>

<div class="overlay" id="badgeOverlay">
  <div class="badge-card">
    <div class="medal">🐚</div>
    <h3>Ngôi Sao Biển!</h3>
    <p>Bé đã đọc đủ 7 ngày cùng Cua Càng. Cả đại dương tự hào về bé!</p>
    <button id="closeBadgeBtn">Tuyệt vời!</button>
  </div>
</div>

    sentences:["Trăng lên trên mặt biển","Dát bạc cả không gian","Sóng vỗ về bờ cát","Rì rào khúc dịu dàng",

    vocab:["sóng cả","tay chèo","cơ đồ","cây ngay"],
    fastwords:["sóng cả","tay chèo","học hay"] },

    fastwords:["lễ hội","ánh trăng","vỏ sò","ngôi sao biển"] }

let current = 0;
let doneSet = new Set();
let badgeEarned = false;
let points = 0;
let quizDone = new Set();
let vietVoice = null;
let playToken = 0;

/* ---------- Storage ---------- */
async function loadProgress(){
  try{
    const res = await window.storage.get('bien-xanh-progress', false);
    if(res && res.value){
      const data = JSON.parse(res.value);
      doneSet = new Set(data.done || []);
      badgeEarned = !!data.badge;
      points = data.points || 0;
    }
  }catch(e){ /* chưa có dữ liệu trước đó */ }
}
async function saveProgress(){
  try{
    await window.storage.set('bien-xanh-progress', JSON.stringify({done:[...doneSet], badge:badgeEarned, points}), false);
  }catch(e){ console.error('Không lưu được tiến trình:', e); }
}

/* ---------- Text to speech ---------- */
function pickVoice(){
  if(!('speechSynthesis' in window)) return;
  const voices = speechSynthesis.getVoices();
  vietVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('vi')) || null;
  const note = document.getElementById('voiceNote');
  if(!vietVoice){ note.textContent = '💡 Máy chưa có giọng đọc tiếng Việt riêng — sẽ dùng giọng mặc định của trình duyệt.'; }
  else { note.textContent = ''; }
}
if('speechSynthesis' in window){ speechSynthesis.onvoiceschanged = pickVoice; pickVoice(); }
else { document.getElementById('voiceNote').textContent = '⚠️ Trình duyệt này chưa hỗ trợ đọc mẫu bằng giọng nói.'; }

function speakOne(text, {onstart, onend} = {}){
  if(!('speechSynthesis' in window)){ if(onend) onend(); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'vi-VN'; if(vietVoice) u.voice = vietVoice;
  u.rate = 0.88; u.pitch = 1.05;
  if(onstart) u.onstart = onstart;
  u.onend = ()=>{ if(onend) onend(); };
  u.onerror = ()=>{ if(onend) onend(); };
  speechSynthesis.speak(u);
}
function stopSpeaking(){
  playToken++;
  if('speechSynthesis' in window) speechSynthesis.cancel();
  document.querySelectorAll('.sentence-row.active').forEach(r=>r.classList.remove('active'));
}
function speakSentenceIndex(i){
  stopSpeaking();
  const row = document.querySelector(`.sentence-row[data-i="${i}"]`);
  if(row) row.classList.add('active');
  speakOne(days[current].sentences[i], { onend: ()=>{ if(row) row.classList.remove('active'); } });
}
function speakAll(){
  stopSpeaking();
  const myToken = ++playToken;
  const list = days[current].sentences;
  let i = 0;
  function next(){
    if(myToken !== playToken) return;
    document.querySelectorAll('.sentence-row.active').forEach(r=>r.classList.remove('active'));
    if(i >= list.length) return;
    const row = document.querySelector(`.sentence-row[data-i="${i}"]`);
    if(row) row.classList.add('active');
    speakOne(list[i], { onend: ()=>{ i++; next(); } });
  }
  next();
}

/* ---------- Vocab helpers ---------- */
function findWordAndFlash(word){
  const list = days[current].sentences;
  const idx = list.findIndex(s => s.toLowerCase().includes(word.toLowerCase()));
  if(idx === -1) return;
  const row = document.querySelector(`.sentence-row[data-i="${idx}"] .txt`);
  if(row){ row.scrollIntoView({behavior:'smooth', block:'center'}); row.classList.remove('flash'); void row.offsetWidth; row.classList.add('flash'); }
}

/* ---------- Quiz ---------- */
function shuffle(arr){ return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(v=>v[1]); }
function buildQuiz(dayIndex){
  const d = days[dayIndex];
  const correct = d.vocab[0];
  const otherWords = days.filter((_,i)=>i!==dayIndex).flatMap(x=>x.vocab).filter(w=>!d.vocab.includes(w));
  const distractors = shuffle(otherWords).slice(0,2);
  const options = shuffle([correct, ...distractors]);
  return { question:`Từ nào có trong bài đọc hôm nay?`, correct, options };
}
function showQuiz(){
  const box = document.getElementById('quizBox');
  const q = buildQuiz(current);
  document.getElementById('quizQ').textContent = '🧠 ' + q.question;
  const opts = document.getElementById('quizOpts');
  opts.innerHTML = '';
  document.getElementById('quizFb').textContent = '';
  q.options.forEach(opt=>{
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt;
    btn.onclick = ()=>{
      const fb = document.getElementById('quizFb');
      if(opt === q.correct){
        btn.classList.add('correct');
        fb.textContent = 'Đúng rồi! Bé giỏi quá! 🎉';
        fb.style.color = '#1F8A66';
        opts.querySelectorAll('.quiz-opt').forEach(b=>b.disabled=true);
        if(!quizDone.has(current)){
          quizDone.add(current);
          addPoints(5, box);
        }
      } else {
        btn.classList.add('wrong');
        fb.textContent = 'Chưa đúng, bé thử lại nhé!';
        fb.style.color = '#C13F3F';
        setTimeout(()=>btn.classList.remove('wrong'), 500);
      }
    };
    opts.appendChild(btn);
  });
  box.classList.add('show');
}

/* ---------- Points ---------- */
function addPoints(n, anchorEl){
  points += n;
  document.getElementById('streakBar').innerHTML = streakBarHTML();
  const el = document.createElement('div');
  el.className = 'point-float';
  el.textContent = '+' + n + ' ⭐';
  (anchorEl || document.getElementById('cheer')).appendChild(el);
  setTimeout(()=>el.remove(), 1300);
  saveProgress();
}
function streakBarHTML(){
  return `⭐ ${doneSet.size}/7 ngày <span class="sep">•</span> 🪙 ${points} điểm`;
}

/* ---------- Rendering ---------- */
function renderPath(){
  const path = document.getElementById('path');
  path.innerHTML = '';
  days.forEach((d,i)=>{
    const btn = document.createElement('button');
    btn.className = 'stone' + (i===current?' active':'') + (doneSet.has(i)?' done':'');
    btn.innerHTML = `<span class="ic">${d.icon}</span><span class="num">Ngày ${i+1}</span>`;
    btn.onclick = ()=>{ stopSpeaking(); current = i; render(); };
    path.appendChild(btn);
  });
  document.getElementById('streakBar').innerHTML = streakBarHTML();
}

function render(){
  const d = days[current];
  document.getElementById('artWrap').innerHTML = ART[d.art] || '';
  document.getElementById('badge').className = 'badge ' + d.type;
  document.getElementById('badge').textContent = d.badge;
  document.getElementById('title').textContent = d.title;

  const story = document.getElementById('story');
  story.innerHTML = '';
  d.sentences.forEach((s,i)=>{
    const row = document.createElement('div');
    row.className = 'sentence-row';
    row.dataset.i = i;
    row.innerHTML = `<button class="pill-btn mini" title="Nghe câu này">🔊</button><span class="txt">${s}</span>`;
    row.querySelector('button').onclick = ()=> speakSentenceIndex(i);
    story.appendChild(row);
  });

  const vocabSection = document.getElementById('vocabSection');
  vocabSection.innerHTML = '';
  if(d.vocab && d.vocab.length){
    vocabSection.innerHTML = `<div class="section-title">🔍 Hãy tìm từ</div>`;
    const row = document.createElement('div'); row.className = 'chip-row';
    d.vocab.forEach(w=>{
      const chip = document.createElement('button');
      chip.className = 'chip'; chip.textContent = w;
      chip.onclick = ()=>{ speakOne(w); findWordAndFlash(w); chip.classList.add('found'); };
      row.appendChild(chip);
    });
    vocabSection.appendChild(row);
  }

  const fastSection = document.getElementById('fastSection');
  fastSection.innerHTML = '';
  if(d.fastwords && d.fastwords.length){
    fastSection.innerHTML = `<div class="section-title">⚡ Đọc thật nhanh</div>`;
    const row = document.createElement('div'); row.className = 'chip-row';
    d.fastwords.forEach(w=>{
      const chip = document.createElement('button');
      chip.className = 'chip fast'; chip.textContent = w + ' 🔊';
      chip.onclick = ()=> speakOne(w);
      row.appendChild(chip);
    });
    fastSection.appendChild(row);
  }

  document.getElementById('quizBox').classList.remove('show');
  document.getElementById('prevBtn').disabled = current===0;
  document.getElementById('nextBtn').disabled = current===days.length-1;
  document.getElementById('cheer').className = 'cheer';
  document.getElementById('cheer').textContent = '';
  renderPath();
  window.scrollTo({top:0, behavior:'smooth'});
}

/* ---------- Controls ---------- */
document.getElementById('listenAllBtn').onclick = speakAll;
document.getElementById('stopBtn').onclick = stopSpeaking;
document.getElementById('prevBtn').onclick = ()=>{ if(current>0){ stopSpeaking(); current--; render(); } };
document.getElementById('nextBtn').onclick = ()=>{ if(current<days.length-1){ stopSpeaking(); current++; render(); } };

document.getElementById('doneBtn').onclick = async ()=>{
  const firstTime = !doneSet.has(current);
  doneSet.add(current);
  renderPath();
  const cheer = document.getElementById('cheer');
  const msgs = ["Giỏi quá! 🌟","Bé đọc hay lắm! 🎉","Sóng vỗ tay khen bé đó! 🌊","Cua Càng tự hào về bé! 🦀"];
  cheer.textContent = msgs[Math.floor(Math.random()*msgs.length)];
  cheer.classList.add('show');
  launchConfetti(24);
  if(firstTime) addPoints(10, cheer); else await saveProgress();
  showQuiz();
  if(doneSet.size === 7 && !badgeEarned){
    badgeEarned = true;
    await saveProgress();
    setTimeout(()=>{ document.getElementById('badgeOverlay').classList.add('show'); launchConfetti(60); }, 500);
  }
};
document.getElementById('closeBadgeBtn').onclick = ()=> document.getElementById('badgeOverlay').classList.remove('show');

function launchConfetti(count){
  const colors = ['#FF7A6B','#FFC93D','#5FC6E8','#3DBFA0','#9B7FE0'];
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random()*100 + 'vw';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDuration = (2 + Math.random()*1.5) + 's';
    p.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 3600);
  }
}

/* ---------- Nhạc nền ---------- */
const bgMusic = document.getElementById('bgMusic');
const musicBtn = document.getElementById('musicBtn');
let musicOn = false;
bgMusic.volume = 0.35;
musicBtn.onclick = ()=>{
  if(musicOn){
    bgMusic.pause();
    musicBtn.classList.remove('playing');
    musicBtn.textContent = '🎵';
    musicOn = false;
  } else {
    bgMusic.play().catch(()=>{
      musicBtn.title = 'Không tìm thấy file nhạc — hãy để Beethoven-Moonlight-64kbps.mp3 cùng thư mục với file này';
    });
    musicBtn.classList.add('playing');
    musicBtn.textContent = '⏸️';
    musicOn = true;
  }
};

(async function init(){ await loadProgress(); render(); })();
</script>
