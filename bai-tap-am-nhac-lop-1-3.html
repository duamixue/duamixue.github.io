<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 Bài Tập Âm Nhạc Lớp 1–3</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D97706; --pink: #EC4899; --purple: #8B5CF6; --teal: #14B8A6;
    --green: #22C55E; --red: #EF4444; --bg: #FDF4FF; --card: #FFFFFF; --text: #1E1B4B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif; background: var(--bg);
    background-image: radial-gradient(circle at 10% 20%, rgba(236,72,153,0.14) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(139,92,246,0.14) 0%, transparent 40%);
    min-height: 100vh; padding: 20px; color: var(--text);
  }
  .header { text-align: center; padding: 40px 20px 30px; }
  .header h1 { font-family: 'Baloo 2', cursive; font-size: 2.6rem; font-weight: 800;
    background: linear-gradient(135deg, var(--pink), var(--purple), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.2; }
  .header p { font-size: 1.1rem; color: #6B7280; margin-top: 8px; }
  .stars { font-size: 2rem; letter-spacing: 6px; margin-bottom: 12px; animation: bounce 2s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)} }
  .legend { display:flex; justify-content:center; gap:18px; flex-wrap:wrap; margin: 0 auto 20px; max-width: 600px; font-size: 0.85rem; font-weight: 700; color:#6B7280; }
  .legend span.tag { padding: 4px 12px; border-radius: 20px; background:white; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .score-bar { display: flex; justify-content: center; align-items: center; gap: 16px; margin: 0 auto 30px; max-width: 500px;
    background: white; border-radius: 50px; padding: 12px 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); flex-wrap: wrap; }
  .score-item { display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: 1rem; }
  .score-item span { font-size: 1.4rem; }
  #score-display { color: var(--pink); font-size: 1.2rem; } #total-display { color: #9CA3AF; }
  .section-title { font-family: 'Baloo 2', cursive; font-size: 1.5rem; font-weight: 800; margin: 30px 0 16px;
    display: flex; align-items: center; gap: 10px; padding: 10px 20px; border-radius: 16px; color: white; }
  .section-title.s1 { background: linear-gradient(135deg, #EC4899, #8B5CF6); }
  .section-title.s2 { background: linear-gradient(135deg, #D97706, #F59E0B); }
  .section-title.s3 { background: linear-gradient(135deg, #14B8A6, #0EA5E9); }
  .section-title.s4 { background: linear-gradient(135deg, #8B5CF6, #EC4899); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 10px; }
  .card { background: var(--card); border-radius: 20px; padding: 22px; box-shadow: 0 4px 16px rgba(0,0,0,0.07);
    border: 2px solid transparent; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; position: relative; overflow: hidden; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,0.12); }
  .card.correct { border-color: var(--green); background: #F0FDF4; }
  .card.wrong { border-color: var(--red); background: #FEF2F2; }
  .card-badge { position: absolute; top: 14px; right: 14px; font-size: 1.5rem; opacity: 0.25; }
  .q-num { font-family: 'Baloo 2', cursive; font-size: 0.8rem; font-weight: 700; color: #9CA3AF; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 6px; display:flex; align-items:center; gap:8px; }
  .diff-tag { font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; letter-spacing: 0; text-transform: none; }
  .diff-1 { background:#DCFCE7; color:#166534; } .diff-2 { background:#FEF3C7; color:#92400E; } .diff-3 { background:#FEE2E2; color:#991B1B; }
  .q-text { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 16px; line-height: 1.5; white-space: pre-line; }
  .options { display: flex; flex-wrap: wrap; gap: 10px; }
  .opt-btn { padding: 10px 18px; border-radius: 50px; border: 2.5px solid #E5E7EB; background: #F9FAFB;
    font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.18s; color: var(--text); }
  .opt-btn:hover:not(:disabled) { border-color: var(--purple); background: #FAF5FF; color: var(--purple); transform: scale(1.04); }
  .opt-btn.correct-opt { background: var(--green); border-color: var(--green); color: white; }
  .opt-btn.wrong-opt { background: var(--red); border-color: var(--red); color: white; }
  .opt-btn:disabled { cursor: default; }
  .feedback { margin-top: 10px; font-size: 0.9rem; font-weight: 700; display: none; animation: fadeIn 0.25s; }
  .feedback.show { display: block; } .feedback.ok { color: var(--green); } .feedback.no { color: var(--red); }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none} }
  .result-section { text-align: center; padding: 40px 20px; margin-top: 30px; background: white; border-radius: 24px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08); display: none; }
  .result-section.show { display: block; animation: fadeIn 0.4s; }
  .result-emoji { font-size: 4rem; margin-bottom: 12px; }
  .result-title { font-family: 'Baloo 2', cursive; font-size: 2rem; font-weight: 800;
    background: linear-gradient(135deg,var(--pink),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .result-sub { color: #6B7280; margin-top: 8px; font-size: 1rem; }
  .restart-btn { margin-top: 20px; padding: 14px 36px; border-radius: 50px; border: none;
    background: linear-gradient(135deg, var(--pink), var(--purple)); color: white; font-family: 'Baloo 2', cursive;
    font-size: 1.1rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 18px rgba(236,72,153,0.35); transition: transform 0.2s; }
  .restart-btn:hover { transform: scale(1.06); }
  .submit-wrap { text-align: center; margin-top: 30px; }
  .submit-btn { padding: 16px 48px; border-radius: 50px; border: none; background: linear-gradient(135deg, #EC4899, #8B5CF6);
    color: white; font-family: 'Baloo 2', cursive; font-size: 1.3rem; font-weight: 700; cursor: pointer;
    box-shadow: 0 5px 22px rgba(236,72,153,0.35); transition: transform 0.2s, box-shadow 0.2s; }
  .submit-btn:hover { transform: scale(1.06); box-shadow: 0 8px 30px rgba(236,72,153,0.45); }
  .max-w { max-width: 960px; margin: 0 auto; }
  @media (max-width: 500px) { .header h1 { font-size: 1.9rem; } .grid { grid-template-columns: 1fr; } }

  .music-btn {
    position: fixed; top: 16px; right: 16px; z-index: 999;
    padding: 10px 18px; border-radius: 50px; border: none;
    background: linear-gradient(135deg, #EC4899, #8B5CF6);
    color: white; font-family: 'Baloo 2', cursive; font-size: 0.95rem;
    font-weight: 700; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    transition: transform 0.2s;
  }
  .music-btn:hover { transform: scale(1.06); }
</style>
</head>
<body>
<div class="max-w">
  <button class="music-btn" id="music-btn" onclick="toggleMusic()">🔈 Nhạc sẽ tự bật khi bé làm bài</button>
  <div class="header">
    <div class="stars">🎵🎼🎶</div>
    <h1>🎹 Bài Tập Âm Nhạc</h1>
    <p>Dành cho bé lớp 1–3 &nbsp;·&nbsp; Khám phá thế giới âm thanh &amp; giai điệu</p>
  </div>
  <div class="legend">
    <span class="tag">🟢 Dễ (lớp 1)</span>
    <span class="tag">🟡 Vừa (lớp 2)</span>
    <span class="tag">🔴 Nâng cao (lớp 3)</span>
  </div>
  <div class="score-bar">
    <div class="score-item"><span>🏆</span> Điểm của bé:</div>
    <div class="score-item" id="score-display">0</div>
    <div class="score-item" id="total-display">/ 0</div>
    <div class="score-item"><span>✅</span> <span id="correct-count">0</span> đúng</div>
  </div>

  <div class="section-title s1">🎼 Phần 1: Nốt nhạc &amp; Khuông nhạc</div>
  <div class="grid" id="s1-grid"></div>

  <div class="section-title s2">🎻 Phần 2: Nhạc cụ</div>
  <div class="grid" id="s2-grid"></div>

  <div class="section-title s3">🎤 Phần 3: Bài hát &amp; Nhạc sĩ</div>
  <div class="grid" id="s3-grid"></div>

  <div class="section-title s4">🥁 Phần 4: Nhịp điệu &amp; Cảm thụ âm nhạc</div>
  <div class="grid" id="s4-grid"></div>

  <div class="submit-wrap"><button class="submit-btn" onclick="submitAll()">🎉 Xem kết quả!</button></div>
  <div class="result-section" id="result-section">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-title" id="result-title">Xuất sắc!</div>
    <div class="result-sub" id="result-sub"></div>
    <button class="restart-btn" onclick="restartAll()">🔄 Làm lại</button>
  </div>
</div>

<script>
const s1Questions = [
  { num:1, badge:'🎵', diff:1, q:'Có bao nhiêu nốt nhạc cơ bản (Đô Rê Mi Fa Sol La Si)?', opts:['5','6','7','8'], answer:'7' },
  { num:2, badge:'🎶', diff:1, q:'Nốt nhạc đầu tiên trong 7 nốt cơ bản là nốt gì?', opts:['Rê','Đô','Mi','Sol'], answer:'Đô' },
  { num:3, badge:'📏', diff:2, q:'Khuông nhạc (nơi ghi các nốt nhạc) thường gồm mấy dòng kẻ?', opts:['3 dòng','4 dòng','5 dòng','6 dòng'], answer:'5 dòng' },
  { num:4, badge:'🔑', diff:2, q:'Khóa nhạc thường dùng trong các bài hát thiếu nhi gọi là khóa gì?', opts:['Khóa Fa','Khóa Son (Sol)','Khóa Đô','Khóa La'], answer:'Khóa Son (Sol)' },
  { num:5, badge:'🎹', diff:2, q:'Nốt nhạc cuối cùng (thứ 7) trong 7 nốt cơ bản là nốt gì?', opts:['La','Sol','Si','Fa'], answer:'Si' },
  { num:6, badge:'📈', diff:3, q:'Khi hát một nốt nhạc "cao" hơn so với nốt trước, âm thanh nghe sẽ như thế nào?', opts:['Trầm hơn','Thanh, cao hơn','To hơn nhưng không đổi cao độ','Không thay đổi'], answer:'Thanh, cao hơn' },
];

const s2Questions = [
  { num:1, badge:'🪕', diff:1, q:'Loại đàn dân tộc Việt Nam nào chỉ có 1 dây?', opts:['Đàn tranh','Đàn bầu','Đàn nguyệt','Đàn tỳ bà'], answer:'Đàn bầu' },
  { num:2, badge:'🥁', diff:1, q:'Nhạc cụ nào dùng để gõ, tạo nhịp mạnh, thường thấy trong lễ hội?', opts:['Sáo','Trống','Đàn violin','Đàn piano'], answer:'Trống' },
  { num:3, badge:'🎹', diff:2, q:'Nhạc cụ nào có phím trắng đen, chơi bằng cách ấn phím?', opts:['Đàn violin','Đàn piano (dương cầm)','Sáo trúc','Đàn bầu'], answer:'Đàn piano (dương cầm)' },
  { num:4, badge:'🎻', diff:2, q:'Nhạc cụ nào cần dùng cung (vĩ) kéo qua dây để phát ra âm thanh?', opts:['Đàn violin (vĩ cầm)','Đàn bầu','Trống','Sáo'], answer:'Đàn violin (vĩ cầm)' },
  { num:5, badge:'🎋', diff:2, q:'Sáo trúc là nhạc cụ được chơi bằng cách nào?', opts:['Gõ','Kéo dây','Thổi hơi','Đàn dây bằng tay'], answer:'Thổi hơi' },
  { num:6, badge:'🎼', diff:3, q:'Đàn tranh Việt Nam là loại nhạc cụ thuộc nhóm nào?', opts:['Nhạc cụ dây gảy','Nhạc cụ hơi','Nhạc cụ gõ','Nhạc cụ điện tử'], answer:'Nhạc cụ dây gảy' },
];

const s3Questions = [
  { num:1, badge:'🇻🇳', diff:1, q:'Quốc ca Việt Nam có tên là gì?', opts:['Tiến Quân Ca','Ai yêu Bác Hồ Chí Minh','Quốc tế ca','Việt Nam quê hương tôi'], answer:'Tiến Quân Ca' },
  { num:2, badge:'🎤', diff:2, q:'Vào lễ chào cờ đầu tuần ở trường, bài hát nào được cử hành?', opts:['Bài hát thiếu nhi bất kỳ','Quốc ca','Nhạc không lời','Không hát bài nào'], answer:'Quốc ca' },
  { num:3, badge:'🎶', diff:2, q:'Nhạc sĩ nào được biết đến với biệt danh gắn liền với nhiều bài hát dành cho thiếu nhi Việt Nam?', opts:['Phong Nhã','Trịnh Công Sơn','Văn Cao','Phú Quang'], answer:'Phong Nhã' },
  { num:4, badge:'✍️', diff:3, q:'Ai là tác giả của bài Quốc ca Việt Nam (Tiến Quân Ca)?', opts:['Văn Cao','Phong Nhã','Trần Hoàn','Hoàng Vân'], answer:'Văn Cao' },
  { num:5, badge:'🎧', diff:2, q:'Người điều khiển, chỉ huy một dàn nhạc hoặc dàn hợp xướng gọi là gì?', opts:['Ca sĩ','Nhạc trưởng','Nhạc công','Khán giả'], answer:'Nhạc trưởng' },
  { num:6, badge:'👥', diff:2, q:'Khi nhiều người cùng hát chung một bài với một bè giọng, gọi là gì?', opts:['Đơn ca','Đồng ca','Song ca','Hợp xướng nhiều bè'], answer:'Đồng ca' },
];

const s4Questions = [
  { num:1, badge:'⚡', diff:1, q:'Âm thanh phát ra dồn dập, mạnh mẽ gọi là nhịp điệu như thế nào?', opts:['Nhịp chậm','Nhịp nhanh','Không có nhịp','Nhịp im lặng'], answer:'Nhịp nhanh' },
  { num:2, badge:'🌙', diff:1, q:'Bài hát ru con thường có nhịp điệu như thế nào?', opts:['Nhanh, sôi động','Chậm rãi, nhẹ nhàng','Rất to','Không có giai điệu'], answer:'Chậm rãi, nhẹ nhàng' },
  { num:3, badge:'👏', diff:2, q:'Vỗ tay đúng theo nhịp bài hát giúp em điều gì?', opts:['Làm ồn lớp học','Cảm thụ và giữ nhịp tốt hơn','Không có tác dụng gì','Hát sai nhịp hơn'], answer:'Cảm thụ và giữ nhịp tốt hơn' },
  { num:4, badge:'🔊', diff:2, q:'Độ to, nhỏ của âm thanh trong âm nhạc được gọi là gì?', opts:['Cao độ','Cường độ (âm lượng)','Trường độ','Âm sắc'], answer:'Cường độ (âm lượng)' },
  { num:5, badge:'⏱️', diff:3, q:'Độ dài, ngắn của một nốt nhạc được gọi là gì?', opts:['Cao độ','Cường độ','Trường độ','Âm sắc'], answer:'Trường độ' },
  { num:6, badge:'🎨', diff:3, q:'Đặc điểm giúp phân biệt âm thanh của đàn piano khác với đàn violin (dù cùng một nốt) gọi là gì?', opts:['Cao độ','Trường độ','Âm sắc','Cường độ'], answer:'Âm sắc' },
];

let answered = {}; let totalAnswerable = 0; let correctCount = 0;

function diffLabel(d) {
  if (d === 1) return '<span class="diff-tag diff-1">🟢 Dễ</span>';
  if (d === 2) return '<span class="diff-tag diff-2">🟡 Vừa</span>';
  return '<span class="diff-tag diff-3">🔴 Nâng cao</span>';
}

function renderChoice(q, containerId, section) {
  totalAnswerable++;
  const id = section+'-'+q.num;
  const div = document.createElement('div');
  div.className = 'card'; div.id = 'card-'+id;
  div.innerHTML = `
    <span class="card-badge">${q.badge}</span>
    <div class="q-num">Câu ${q.num} ${diffLabel(q.diff)}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">
      ${q.opts.map(o=>`<button class="opt-btn" onclick="checkChoice('${id}','${o.replace(/'/g,"\\'")}','${q.answer.replace(/'/g,"\\'")}',this)">${o}</button>`).join('')}
    </div>
    <div class="feedback" id="fb-${id}"></div>`;
  document.getElementById(containerId).appendChild(div);
}

function checkChoice(id, chosen, correct, btn) {
  if (answered[id]) return;
  answered[id] = true;
  const card = document.getElementById('card-'+id);
  const fb = document.getElementById('fb-'+id);
  card.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent.trim() === correct) b.classList.add('correct-opt');
  });
  if (chosen === correct) {
    btn.classList.add('correct-opt'); card.classList.add('correct');
    fb.textContent = '🎉 Đúng rồi! Bé giỏi quá!'; fb.className = 'feedback show ok';
    correctCount++;
  } else {
    btn.classList.add('wrong-opt'); card.classList.add('wrong');
    fb.textContent = '❌ Chưa đúng! Đáp án là: '+correct; fb.className = 'feedback show no';
  }
  updateScore();
}

function updateScore() {
  document.getElementById('score-display').textContent = correctCount * 10;
  document.getElementById('correct-count').textContent = correctCount;
}

function submitAll() {
  const pct = totalAnswerable > 0 ? correctCount / totalAnswerable : 0;
  const emoji = document.getElementById('result-emoji');
  const title = document.getElementById('result-title');
  const sub = document.getElementById('result-sub');
  if (pct >= 0.9) { emoji.textContent='🏆'; title.textContent='Xuất sắc! Nghệ sĩ nhí tài năng!'; }
  else if (pct >= 0.7) { emoji.textContent='🎵'; title.textContent='Giỏi lắm! Cố lên nha!'; }
  else if (pct >= 0.5) { emoji.textContent='😊'; title.textContent='Khá tốt! Luyện thêm nhé!'; }
  else { emoji.textContent='💪'; title.textContent='Cố gắng hơn nhé bé!'; }
  sub.textContent = 'Bé làm đúng '+correctCount+'/'+totalAnswerable+' câu · '+correctCount*10+' điểm';
  const res = document.getElementById('result-section');
  res.classList.add('show');
  res.scrollIntoView({behavior:'smooth',block:'center'});
}

function restartAll() {
  answered = {}; correctCount = 0;
  document.getElementById('score-display').textContent = '0';
  document.getElementById('correct-count').textContent = '0';
  document.getElementById('result-section').classList.remove('show');
  ['s1-grid','s2-grid','s3-grid','s4-grid'].forEach(id => document.getElementById(id).innerHTML='');
  totalAnswerable = 0;
  init();
}

function init() {
  s1Questions.forEach(q => renderChoice(q,'s1-grid','s1'));
  s2Questions.forEach(q => renderChoice(q,'s2-grid','s2'));
  s3Questions.forEach(q => renderChoice(q,'s3-grid','s3'));
  s4Questions.forEach(q => renderChoice(q,'s4-grid','s4'));
  document.getElementById('total-display').textContent = '/ '+(totalAnswerable*10);
}
init();
</script>

<audio id="bgm" preload="none">
  <source src="hungarian_dances.mp3" type="audio/mpeg">
</audio>
<script>
(function() {
  var audio = document.getElementById('bgm');
  var btn = document.getElementById('music-btn');
  var playCount = 0;
  var maxPlays = 3;
  var hasStarted = false;
  var userPaused = false;

  audio.addEventListener('ended', function() {
    playCount++;
    if (playCount < maxPlays) {
      audio.currentTime = 0;
      audio.play();
    } else {
      playCount = 0;
      hasStarted = false;
      btn.textContent = '🔈 Bật nhạc nền';
    }
  });

  function startMusicOnce() {
    if (hasStarted || userPaused) return;
    hasStarted = true;
    playCount = 0;
    audio.currentTime = 0;
    audio.play().catch(function(){});
    btn.textContent = '🔊 Tắt nhạc (đang phát)';
  }
  document.addEventListener('click', function(e) {
    if (e.target.classList && (e.target.classList.contains('opt-btn') || e.target.classList.contains('check-btn'))) {
      startMusicOnce();
    }
  }, true);

  window.toggleMusic = function() {
    if (audio.paused) {
      userPaused = false;
      hasStarted = true;
      playCount = 0;
      audio.currentTime = 0;
      audio.play().catch(function(){});
      btn.textContent = '🔊 Tắt nhạc (đang phát)';
    } else {
      audio.pause();
      audio.currentTime = 0;
      playCount = 0;
      userPaused = true;
      btn.textContent = '🔈 Bật nhạc nền';
    }
  };
})();
</script>
</body>
</html>
