<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦖 Vùng Đất Khủng Long - Số Đếm Kỳ Diệu 11–20</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Baloo 2', cursive;
    background: linear-gradient(180deg, #a1c4fd 0%, #c2e9fb 35%, #d4f7a0 70%, #4caf50 100%);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Sun and Magical Twinkle */
  .sun {
    position: fixed; top: 20px; right: 20px; width: 80px; height: 80px;
    background: radial-gradient(circle, #ffeb3b 30%, #ff9800 100%);
    border-radius: 50%; box-shadow: 0 0 30px #ffeb3b; z-index: 1;
    animation: pulseSun 4s ease-in-out infinite alternate;
  }
  @keyframes pulseSun { from { transform: scale(0.95); opacity: 0.9; } to { transform: scale(1.05); opacity: 1; } }

  /* Clouds */
  .cloud { position:fixed; background:white; border-radius:50px; opacity:.9; pointer-events:none; z-index: 2; }
  .cloud::before,.cloud::after { content:''; position:absolute; background:white; border-radius:50%; }
  .cloud-1 { width:170px;height:55px;top:8%;left:-200px;animation:floatCloud 20s linear infinite; }
  .cloud-1::before{width:85px;height:85px;top:-45px;left:22px;}
  .cloud-1::after{width:60px;height:60px;top:-30px;left:80px;}
  .cloud-2 { width:130px;height:40px;top:22%;left:-160px;animation:floatCloud 28s linear 5s infinite; }
  .cloud-2::before{width:65px;height:65px;top:-32px;left:18px;}
  .cloud-2::after{width:45px;height:45px;top:-22px;left:60px;}
  .cloud-3 { width:150px;height:48px;top:5%;left:-180px;animation:floatCloud 24s linear 11s infinite; }
  .cloud-3::before{width:75px;height:75px;top:-38px;left:20px;}
  .cloud-3::after{width:52px;height:52px;top:-26px;left:70px;}
  @keyframes floatCloud { from{left:-220px} to{left:110%} }

  /* Ground decoration */
  .ground { position:fixed;bottom:0;left:0;right:0;height:75px;background:#388e3c;border-radius:50% 50% 0 0/25px 25px 0 0;z-index:5; }
  .ground::before{content:'';position:absolute;top:-22px;left:0;right:0;height:25px;background:#4caf50;border-radius:50%;}

  /* Header */
  .header { text-align:center;padding:25px 16px 5px;position:relative;z-index:10; }
  .header h1 {
    font-size: clamp(2.2rem, 8vw, 3.8rem);
    font-weight:800; color:#fff;
    text-shadow: 0 5px 0 #2e7d32, 0 8px 20px rgba(0,0,0,.15);
    letter-spacing:0.5px;
    animation: floatHeader 4s ease-in-out infinite;
  }
  @keyframes floatHeader { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  .header p { font-size:1.25rem;color:#1b5e20; text-shadow:0 1px 2px rgba(255,255,255,0.6); margin-top:6px; font-weight:600; }

  /* Score bar */
  .score-bar { text-align:center;position:relative;z-index:10;padding:5px 0 15px; }
  .stars-row { font-size:1.7rem;letter-spacing:4px;display:block; transition: all 0.3s ease; }
  .score-text { font-size:1.1rem;font-weight:800;color:#1b5e20;background: rgba(255,255,255,0.6); display: inline-block; padding: 4px 16px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-top: 5px; }

  /* Grid Map */
  .number-grid {
    display:flex;flex-wrap:wrap;justify-content:center;
    gap:22px;padding:15px 16px 140px;
    max-width:820px;margin:0 auto;
    position:relative;z-index:10;
  }

  /* Enhanced Dino Egg Buttons */
  .num-btn {
    width:135px;height:135px;
    border: 3px solid rgba(255,255,255,0.4); cursor:pointer;
    font-family:'Baloo 2',cursive;
    color:white;
    text-shadow:0 3px 5px rgba(0,0,0,.25);
    box-shadow:0 9px 0 rgba(0,0,0,.15), 0 12px 25px rgba(0,0,0,.12);
    transition: transform .15s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow .15s, background 0.3s;
    position:relative;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    line-height:1;
    animation: floatBtn 3.5s ease-in-out infinite;
  }
  .num-btn:nth-child(even) { animation-delay: .6s; }
  .num-btn:nth-child(3n)   { animation-delay: 1.2s; }
  @keyframes floatBtn {
    0%,100%{transform:translateY(0) rotate(0deg);}
    50%{transform:translateY(-8px) rotate(2deg);}
  }
  
  .num-btn .toy-icon { font-size:2.4rem; line-height:1; margin-bottom: 2px; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.15)); }
  .num-btn .btn-num  { font-size:2.5rem; font-weight:800; line-height:1; }

  /* Glossy egg reflection style */
  .num-btn::before {
    content:'';position:absolute;top:6px;left:14px;right:14px;
    height:16px;background:rgba(255,255,255,.38);border-radius:50% 50% 10px 10px;
  }
  /* Pulse effect for undiscovered buttons */
  .num-btn:not(.discovered)::after {
    content: ''; position: absolute; inset: 0; border-radius: inherit;
    box-shadow: inset 0 0 15px rgba(255,255,255,0.5);
    animation: pulseGlow 2s infinite; opacity: 0.6;
  }
  @keyframes pulseGlow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }

  .num-btn:hover  { transform:translateY(-6px) scale(1.08) !important; box-shadow:0 15px 0 rgba(0,0,0,.12),0 22px 30px rgba(0,0,0,.15); }
  .num-btn:active { transform:translateY(4px) scale(.96) !important; box-shadow:0 3px 0 rgba(0,0,0,.15); }

  /* Organic Dinosaur Egg Shapes */
  .shape-egg-1 { border-radius: 50% 50% 50% 50% / 65% 65% 40% 40%; }
  .shape-egg-2 { border-radius: 45% 55% 45% 55% / 60% 60% 45% 45%; }
  .shape-egg-3 { border-radius: 55% 45% 55% 45% / 55% 55% 45% 45%; }

  /* Jurassic Theme Colors (Fresh, energetic tones) */
  .num-btn:nth-child(1)  { background:linear-gradient(135deg,#ff5252,#c62828); } /* Khủng long đỏ */
  .num-btn:nth-child(2)  { background:linear-gradient(135deg,#ff9800,#ef6c00); } /* Cam ấm áp */
  .num-btn:nth-child(3)  { background:linear-gradient(135deg,#fdd835,#f57f17); color:#4e342e; text-shadow:none; } /* Vàng nắng */
  .num-btn:nth-child(4)  { background:linear-gradient(135deg,#4caf50,#2e7d32); } /* Xanh rừng già */
  .num-btn:nth-child(5)  { background:linear-gradient(135deg,#00bcd4,#00838f); } /* Xanh ngọc biển */
  .num-btn:nth-style(6)  { background:linear-gradient(135deg,#2196f3,#1565c0); } /* Xanh bầu trời */
  .num-btn:nth-child(6)  { background:linear-gradient(135deg,#673ab7,#4527a0); } /* Tím thạch anh */
  .num-btn:nth-child(7)  { background:linear-gradient(135deg,#9c27b0,#6a1b9a); } /* Tím hoa phong lan */
  .num-btn:nth-child(8)  { background:linear-gradient(135deg,#e91e63,#ad1457); } /* Hồng rực rỡ */
  .num-btn:nth-child(9)  { background:linear-gradient(135deg,#ff5722,#d84315); } /* Đỏ nham thạch */
  .num-btn:nth-child(10) { background:linear-gradient(135deg,#009688,#00695c); } /* Xanh rêu cổ đại */

  /* Dino Control Area */
  .dino-wrap { position:fixed;bottom:62px;left:-180px;z-index:20; }
  .dino-wrap.walking { animation:dinoWalk 2.5s cubic-bezier(.25,1,.5,1) forwards; }
  .dino-wrap.idle    { left:16px; }
  @keyframes dinoWalk { 0%{left:-180px} 100%{left:16px} }
  
  .dino {
    font-size:7rem;line-height:1;display:inline-block;
    animation:dinoBounce .5s ease-in-out infinite alternate;
    filter:drop-shadow(0 6px 12px rgba(0,0,0,.22));
    cursor: pointer; pointer-events: all;
    transition: transform 0.2s;
  }
  @keyframes dinoBounce {
    from{transform:translateY(0) rotate(-3deg);}
    to  {transform:translateY(-12px) rotate(3deg);}
  }
  .dino:hover { transform: scale(1.05); }
  
  /* Active Roar Animation */
  .dino.roaring {
    animation: dinoRoarAnim 0.6s ease-in-out !important;
  }
  @keyframes dinoRoarAnim {
    0%, 100% { transform: scale(1) translateY(0) rotate(0); }
    30% { transform: scale(1.3) translateY(-35px) rotate(-12deg); }
    50% { transform: scale(1.3) translateY(-35px) rotate(12deg); }
    70% { transform: scale(1.2) translateY(-20px) rotate(-6deg); }
  }

  /* Speech Bubble */
  .speech-bubble {
    position:absolute;bottom:calc(100% + 15px);left:40px;
    transform:scale(0);
    background:white;border-radius:24px;padding:14px 24px;
    font-size:1.25rem;font-weight:700;color:#2e7d32;
    white-space:nowrap; border: 3px solid #81c784;
    box-shadow:0 6px 25px rgba(0,0,0,.15);
    transform-origin:bottom left;
    transition:transform .35s cubic-bezier(.34,1.56,.64,1);
    z-index:30;
  }
  .speech-bubble.show { transform:scale(1); }
  .speech-bubble::after {
    content:'';position:absolute;top:100%;left:35px;
    border:12px solid transparent;border-top-color:white;
  }
  .speech-bubble::before {
    content:'';position:absolute;top:100%;left:32px;
    border:15px solid transparent;border-top-color:#81c784;z-index:-1;
  }

  /* Modal Overlay */
  .overlay {
    position:fixed;inset:0;background:rgba(27,94,32,0.45);
    z-index:100;display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;transition:opacity .3s ease;
    backdrop-filter:blur(6px);
  }
  .overlay.show { opacity:1;pointer-events:all; }

  /* Premium Treasure Card Card */
  .treasure-card {
    background: linear-gradient(165deg, #ffffe0 0%, #fff9c4 100%);
    border-radius:36px; padding:30px 24px 26px;
    max-width:400px; width:92%;
    text-align:center;
    box-shadow: 0 30px 80px rgba(0,0,0,.28), inset 0 3px 0 #ffffff;
    border: 5px solid #ffca28;
    transform: scale(.5) rotate(-8deg);
    transition: transform .45s cubic-bezier(.34,1.56,.64,1);
    position: relative;
  }
  .overlay.show .treasure-card { transform:scale(1) rotate(0deg); }

  /* Ribbon Badge inside Card */
  .card-badge {
    position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, #ff9800, #f57c00);
    color: white; padding: 4px 20px; border-radius: 20px;
    font-size: 0.95rem; font-weight: 800; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    letter-spacing: 0.5px; text-transform: uppercase;
  }

  .chest-icon { font-size:3.8rem;display:inline-block; margin-top: 5px; animation:chestPop .65s cubic-bezier(.34,1.56,.64,1); }
  @keyframes chestPop {
    0%{transform:scale(1);} 40%{transform:scale(1.4) rotate(15deg);}
    70%{transform:scale(.9) rotate(-8deg);} 100%{transform:scale(1);}
  }

  .cardNumberContainer { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 4px 0; }
  .card-number {
    font-size: 6.8rem; font-weight: 800; line-height: 1;
    text-shadow: 0 5px 0 rgba(0,0,0,0.1);
  }
  .card-emoji-big {
    font-size: 5.2rem; display:block; margin: 5px 0;
    animation: popIn .55s cubic-bezier(.34,1.56,.64,1) .1s both;
  }
  @keyframes popIn {
    from{transform:scale(0) rotate(-20deg);opacity:0;}
    to  {transform:scale(1) rotate(0);opacity:1;}
  }
  .card-label { font-size:1.65rem; font-weight:800; color:#5d4037; margin-bottom:6px; }
  .card-desc  { font-size:1.18rem; color:#6d4c41; font-weight:600; line-height:1.6; margin-bottom:6px; padding: 0 10px; }

  /* Buttons on card */
  .btn-row { display:flex; gap:16px; justify-content:center; margin-top:22px; flex-wrap:wrap; }
  .card-speak {
    padding:14px 28px;
    background: linear-gradient(135deg, #29b6f6, #0288d1);
    color:white; border:none; border-radius:50px;
    font-family:'Baloo 2',cursive; font-size:1.3rem; font-weight:700;
    cursor:pointer; box-shadow: 0 5px 0 #01579b;
    transition: transform .1s, box-shadow .1s; min-width:130px;
  }
  .card-speak:hover  { transform:translateY(-2px); box-shadow:0 7px 0 #01579b; }
  .card-speak:active { transform:translateY(3px); box-shadow:0 2px 0 #01579b; }
  
  .card-close {
    padding:14px 28px;
    background: linear-gradient(135deg, #ff7043, #d84315);
    color:white; border:none; border-radius:50px;
    font-family:'Baloo 2',cursive; font-size:1.3rem; font-weight:700;
    cursor:pointer; box-shadow: 0 5px 0 #bf360c;
    transition: transform .1s, box-shadow .1s; min-width:130px;
  }
  .card-close:hover  { transform:translateY(-2px); box-shadow:0 7px 0 #bf360c; }
  .card-close:active { transform:translateY(3px); box-shadow:0 2px 0 #bf360c; }

  /* Discovered (Fly Away Effect) */
  .num-btn.discovered {
    animation: btnFlyAway 0.75s cubic-bezier(.4,0,.6,1) forwards !important;
    pointer-events: none; opacity: 0.2;
  }
  @keyframes btnFlyAway {
    0%   { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
    30%  { transform: translateY(-20px) scale(1.15); opacity: 1; }
    100% { transform: translateY(-80px) scale(0.6); opacity: 0.2; filter: blur(1px); }
  }

  /* Confetti and Spark styles */
  .confetti-piece {
    position:fixed; border-radius:2px; pointer-events:none; z-index:200;
    animation:confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%  {transform:translateY(-20px) rotate(0deg); opacity:1;}
    100%{transform:translateY(100vh) rotate(720deg); opacity:0;}
  }
  .spark {
    position:fixed; pointer-events:none; z-index:150; font-size:2.2rem;
    animation:sparkBurst .95s ease-out forwards;
  }
  @keyframes sparkBurst {
    0%  {transform:scale(0) translate(0,0); opacity:1;}
    100%{transform:scale(1.8) translate(var(--tx),var(--ty)); opacity:0;}
  }
</style>
</head>
<body>

<div class="sun"></div>
<div class="cloud cloud-1"></div>
<div class="cloud cloud-2"></div>
<div class="cloud cloud-3"></div>
<div class="ground"></div>

<!-- Interactive Dino -->
<div class="dino-wrap" id="dinoWrap">
  <div class="speech-bubble" id="bubble">Chào bé! Thử thách số lớn hơn nhé! 🚀</div>
  <div class="dino" id="mainDino" onclick="dinoRoar()">JS_DINO_REPLACE</div>
</div>

<!-- Header -->
<div class="header">
  <h1>🦖 Thung Lũng Khủng Long</h1>
  <p>Chạm vào từng quả trứng thần kỳ để học đếm số từ 11 đến 20 nhé!</p>
</div>
<div class="score-bar">
  <span class="stars-row" id="starsRow">⬜⬜⬜⬜⬜⬜⬜⬜⬜⬜</span>
  <div class="score-text" id="scoreText">Bộ sưu tập: 0 / 10 Trứng</div>
</div>

<!-- Beautiful Dinosaur Egg Grid Map -->
<div class="number-grid">
  <button class="num-btn shape-egg-1" id="btn-11" onclick="openNumber(11)">
    <span class="toy-icon">🦖</span><span class="btn-num">11</span>
  </button>
  <button class="num-btn shape-egg-2" id="btn-12" onclick="openNumber(12)">
    <span class="toy-icon">🦕</span><span class="btn-num">12</span>
  </button>
  <button class="num-btn shape-egg-3" id="btn-13" onclick="openNumber(13)">
    <span class="toy-icon">🌋</span><span class="btn-num">13</span>
  </button>
  <button class="num-btn shape-egg-1" id="btn-14" onclick="openNumber(14)">
    <span class="toy-icon">🌵</span><span class="btn-num">14</span>
  </button>
  <button class="num-btn shape-egg-2" id="btn-15" onclick="openNumber(15)">
    <span class="toy-icon">🌴</span><span class="btn-num">15</span>
  </button>
  <button class="num-btn shape-egg-3" id="btn-16" onclick="openNumber(16)">
    <span class="toy-icon">🥚</span><span class="btn-num">16</span>
  </button>
  <button class="num-btn shape-egg-1" id="btn-17" onclick="openNumber(17)">
    <span class="toy-icon">🐉</span><span class="btn-num">17</span>
  </button>
  <button class="num-btn shape-egg-2" id="btn-18" onclick="openNumber(18)">
    <span class="toy-icon"> crocodiles 🐊 </span><span class="btn-num">18</span>
  </button>
  <button class="num-btn shape-egg-3" id="btn-19" onclick="openNumber(19)">
    <span class="toy-icon">🐢</span><span class="btn-num">19</span>
  </button>
  <button class="num-btn shape-egg-1" id="btn-20" onclick="openNumber(20)">
    <span class="toy-icon">💎</span><span class="btn-num">20</span>
  </button>
</div>

<!-- Modal View -->
<div class="overlay" id="overlay" onclick="closeCard(event)">
  <div class="treasure-card" id="card">
    <div class="card-badge">Bí ẩn trứng cổ đại</div>
    <div class="chest-icon" id="chestIcon">🎁</div>
    <div class="cardNumberContainer">
      <span class="card-number" id="cardNumber" style="color:#e67e00">11</span>
    </div>
    <span class="card-emoji-big" id="cardEmoji">🥢</span>
    <div class="card-label" id="cardLabel">Đôi đũa</div>
    <div class="card-desc" id="cardDesc">Mô tả số ở đây!</div>
    <div class="btn-row">
      <button class="card-speak" onclick="speakIt()">🔊 Nghe lại</button>
      <button class="card-close" onclick="closeOverlay()">Tiếp tục 🎈</button>
    </div>
  </div>
</div>

<script>
// Correct emoji bugs
document.getElementById('btn-18').querySelector('.toy-icon').textContent = '🐊';
document.getElementById('mainDino').textContent = '🦕';

const data = {
  11: {
    emoji:'🥢', label:'Số mười một (11)',
    desc:'Số 11 gồm hai chữ số 1 đứng cạnh nhau thân thiết, giống như một đôi đũa ngay ngắn của bé!',
    speak:'Số mười một! Hai số một đứng cạnh nhau giống như một đôi đũa xinh xắn.',
    chest:'✨', color:'#e63946'
  },
  12: {
    emoji:'⏰', label:'Số mười hai (12)',
    desc:'Số 12 ứng với mười hai giờ trưa tròn trịa trên mặt chiếc đồng hồ quay đều mỗi ngày!',
    speak:'Số mười hai! Giống như mười hai giờ trên mặt chiếc đồng hồ treo tường.',
    chest:'💎', color:'#f57c00'
  },
  13: {
    emoji:'👑', label:'Số mười ba (13)',
    desc:'Số 13 lấp lánh như chiếc vương miện quý giá của hoàng tử và công chúa nhỏ trong truyện cổ tích!',
    speak:'Số mười ba! Lung linh như chiếc vương miện cổ tích xinh đẹp.',
    chest:'🔮', color:'#f1c40f'
  },
  14: {
    emoji:'🪁', label:'Số mười bốn (14)',
    desc:'Số 14 thanh mảnh giống như một cánh diều sắc màu đang no gió bay cao trên bầu trời rộng lớn!',
    speak:'Số mười bốn! Nhẹ nhàng như cánh diều no gió bay cao tít trên nền trời xanh.',
    chest:'🍀', color:'#2ecc71'
  },
  15: {
    emoji:'🌙', label:'Số mười lăm (15)',
    desc:'Số 15 dịu dàng như vầng trăng rằm đêm trung thu, tròn xoe và tỏa ánh sáng vàng ấm áp!',
    speak:'Số mười lăm! Tròn và sáng rực rỡ như ánh trăng đêm rằm trung thu.',
    chest:'⭐', color:'#00bcd4'
  },
  16: {
    emoji:'🍬', label:'Số mười sáu (16)',
    desc:'Số 16 ngọt ngào như một túi kẹo đầy sắc màu, phần thưởng tuyệt vời dành cho bé ngoan!',
    speak:'Số mười sáu! Ngọt ngào như một hũ kẹo đầy màu sắc thưởng cho bé học giỏi.',
    chest:'🎉', color:'#3f51b5'
  },
  17: {
    emoji:'🍦', label:'Số mười bảy (17)',
    desc:'Số 17 giống như cây kem ốc quế mát lạnh, thơm ngon cho một ngày hè ngập tràn niềm vui!',
    speak:'Số mười bảy! Mát lạnh và ngon lành như một cây kem ốc quế vị dâu sô cô la.',
    chest:'🍧', color:'#9c27b0'
  },
  18: {
    emoji:'🐙', label:'Số mười tám (18)',
    desc:'Số 18 kỳ thú như chú bạch tuộc thông minh dưới đại dương, có đúng mười tám chiếc xúc tu nhỏ!',
    speak:'Số mười tám! Thú vị như chú bạch tuộc thông minh lướt đi dưới lòng biển sâu.',
    chest:'⚓', color:'#e91e63'
  },
  19: {
    emoji:'🌻', label:'Số mười chín (19)',
    desc:'Số 19 rực rỡ như đóa hoa hướng dương luôn kiêu hãnh hướng về phía mặt trời ấm áp!',
    speak:'Số mười chín! Tươi vui như bông hoa hướng dương luôn hướng về mặt trời rực rỡ.',
    chest:'☀️', color:'#ff5722'
  },
  20: {
    emoji:' swans 🦢 ', label:'Số hai mươi (20)',
    desc:'Số 20 gồm chú thiên nga số 2 kiêu hãnh đang bơi lội bên cạnh quả trứng vàng số 0 tròn trịa!',
    speak:'Số hai mươi! Chú thiên nga số hai kiêu hãnh bơi bên cạnh quả trứng số không tròn xoe.',
    chest:'🏆', color:'#009688'
  }
};

// Fix final data emoji bug
data[20].emoji = ' Swan 🦢 ';
data[20].emoji = '🦢';

const discovered = new Set();
let currentSpeak = '';
let pendingDiscover = null;

// Speech Synthesis
function speak(text) {
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'vi-VN';
  u.rate = 0.82; // optimized pace for kid interaction
  u.pitch = 1.18; // slightly enthusiastic tone
  window.speechSynthesis.speak(u);
}
function speakIt() { speak(currentSpeak); }

// Ambient sparkles background
function initMagicalStars() {
  const colors = ['#fff', '#ffd700', '#ffeb3b', '#e0f7fa', '#ffe0b2'];
  for(let i=0; i<16; i++){
    const s = document.createElement('div');
    s.style.cssText = `position:fixed; border-radius:50%; pointer-events:none;
      width:${4 + Math.random()*6}px; height:${4 + Math.random()*6}px;
      background:${colors[i % colors.length]}; top:${Math.random()*60}%; left:${Math.random()*100}%;
      animation:twinkle ${2.5 + Math.random()*2.5}s ease-in-out ${Math.random()*3}s infinite; opacity:0.3; z-index:1;`;
    document.body.appendChild(s);
  }
}
const styleSheet = document.createElement('style');
styleSheet.textContent = '@keyframes twinkle{0%,100%{opacity:0.2;transform:scale(1)}50%{opacity:0.9;transform:scale(1.4)}}';
document.head.appendChild(styleSheet);
initMagicalStars();

// Intro animation trigger
window.addEventListener('load',()=>{
  setTimeout(()=>{
    const w = document.getElementById('dinoWrap');
    w.classList.add('walking');
    w.addEventListener('animationend',()=>{
      w.classList.remove('walking');
      w.classList.add('idle');
      showBubble('Chào bé yêu! Thử thách kỷ Jura 11-20 bắt đầu! 🦖');
      speak('Chào bé ngoan! Hãy cùng bạn Khủng long cổ dài khám phá thung lũng số đếm từ mười một đến hai mươi nhé!');
    },{once:true});
  },400);
});

function showBubble(text){
  const b = document.getElementById('bubble');
  b.textContent = text;
  b.classList.remove('show');
  void b.offsetWidth;
  b.classList.add('show');
}
function hideBubble(){ document.getElementById('bubble').classList.remove('show'); }

// Physical Dino Interaction
function dinoRoar() {
  const dino = document.getElementById('mainDino');
  dino.classList.add('roaring');
  
  const phrases = [
    'Gầm gừ! Bé siêu thông minh luôn! 🦖',
    'Khủng long thích bé đếm số lắm! 🦕',
    'Đập tay cái nào! Bé học giỏi quá! ✨',
    'Cố lên bé ơi, sắp thu thập đủ trứng rồi! 🥚'
  ];
  showBubble(phrases[Math.floor(Math.random()*phrases.length)]);
  speak('Khủng long gầm rừ vui sướng và khen bé học toán cực kỳ thông minh!');
  
  dino.addEventListener('animationend', () => {
    dino.classList.remove('roaring');
  }, {once: true});
}

function openNumber(n){
  const d = data[n];
  const dynamicPhrases = [
    `Oa! Quả trứng số ${n} đang nở kìa! 🎉`,
    `Tuyệt vời! Bé tìm thấy số ${n} rồi! 🌟`,
    `Hộp báu số ${n} bí mật xuất hiện! 🎁`,
    `Số ${n} trốn kỹ thế mà vẫn bị bé tìm ra! 🔎`
  ];
  showBubble(dynamicPhrases[Math.floor(Math.random()*dynamicPhrases.length)]);
  spawnSparks();

  setTimeout(()=>{
    const ci = document.getElementById('chestIcon');
    ci.textContent = d.chest;
    ci.className = ''; void ci.offsetWidth; ci.className = 'chest-icon';

    document.getElementById('cardNumber').textContent = n;
    document.getElementById('cardNumber').style.color = d.color;
    document.getElementById('cardEmoji').textContent = d.emoji;
    document.getElementById('cardLabel').textContent = d.label;
    document.getElementById('cardDesc').textContent = d.desc;

    currentSpeak = d.speak;
    document.getElementById('overlay').classList.add('show');

    speak(d.speak);

    if(!discovered.has(n)){ 
      discovered.add(n); 
      updateScore(); 
      pendingDiscover = n; 
    }
    setTimeout(spawnConfetti, 150);
  }, 300);
}

function updateScore(){
  const n = discovered.size, total = 10;
  document.getElementById('scoreText').textContent = `Bộ sưu tập: ${n} / ${total} Trứng`;
  document.getElementById('starsRow').textContent = '⭐'.repeat(n) + '⬜'.repeat(Math.max(0, total - n));
  
  if(n === total){
    setTimeout(()=>{
      showBubble('🏆 Kỷ Lục Gia! Bé đã mở khóa toàn bộ thung lũng rồi!');
      speak('Chúc mừng bé yêu đã xuất sắc tìm được toàn bộ mười quả trứng cổ đại từ mười một đến hai mươi! Bé là nhà toán học thông thái nhất!');
      for(let i=0; i<5; i++) setTimeout(spawnConfetti, i*300);
    }, 700);
  }
}

function closeOverlay(){
  document.getElementById('overlay').classList.remove('show');
  hideBubble();
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  if(pendingDiscover !== null) {
    const btn = document.getElementById('btn-' + pendingDiscover);
    if(btn) btn.classList.add('discovered');
    pendingDiscover = null;
  }
}
function closeCard(e){ if(e.target === document.getElementById('overlay')) closeOverlay(); }

function spawnConfetti(){
  const colors = ['#ff5252', '#ffeb3b', '#2196f3', '#4caf50', '#ff9800', '#e91e63', '#9c27b0'];
  for(let i=0; i<40; i++){
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.cssText = `left:${10 + Math.random()*80}%; top:-15px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${6 + Math.random()*10}px; height:${6 + Math.random()*10}px;
      border-radius:${Math.random() > .5 ? '50%' : '4px'};
      animation-duration:${1.3 + Math.random()*1.5}s;
      animation-delay:${Math.random()*.5}s;`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3000);
  }
}

function spawnSparks(){
  const icons = ['✨', '⭐', '🦖', '🌟', '🎉', '🥚'];
  for(let i=0; i<10; i++){
    const s = document.createElement('div');
    s.className = 'spark';
    const angle = (i / 10) * Math.PI * 2, dist = 80 + Math.random()*110;
    s.style.cssText = `left:${40 + Math.random()*20}%; top:${30 + Math.random()*20}%;
      --tx:${Math.cos(angle)*dist}px; --ty:${Math.sin(angle)*dist}px;
      animation-delay:${Math.random()*.15}s;`;
    s.textContent = icons[Math.floor(Math.random()*icons.length)];
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1200);
  }
}
</script>
</body>
</html>
