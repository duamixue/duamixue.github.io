<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 Bài Tập Vui Cho Bé 6–8 Tuổi</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FFD93D;
    --orange: #FF6B35;
    --pink: #FF6B9D;
    --blue: #4ECDC4;
    --purple: #A855F7;
    --green: #22C55E;
    --red: #EF4444;
    --bg: #FFFBF0;
    --card: #FFFFFF;
    --text: #1E1B4B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,217,61,0.15) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(78,205,196,0.15) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(168,85,247,0.08) 0%, transparent 60%);
    min-height: 100vh;
    padding: 20px;
    color: var(--text);
  }
  .header { text-align: center; padding: 40px 20px 30px; }
  .header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 2.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--orange), var(--pink), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }
  .header p { font-size: 1.1rem; color: #6B7280; margin-top: 8px; }
  .stars { font-size: 2rem; letter-spacing: 6px; margin-bottom: 12px; animation: bounce 2s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)} }

  .score-bar {
    display: flex; justify-content: center; align-items: center; gap: 16px;
    margin: 0 auto 30px; max-width: 500px;
    background: white; border-radius: 50px; padding: 12px 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08); flex-wrap: wrap;
  }
  .score-item { display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: 1rem; }
  .score-item span { font-size: 1.4rem; }
  #score-display { color: var(--orange); font-size: 1.2rem; }
  #total-display { color: #9CA3AF; }

  .section-title {
    font-family: 'Baloo 2', cursive; font-size: 1.5rem; font-weight: 800;
    margin: 30px 0 16px; display: flex; align-items: center; gap: 10px;
    padding: 10px 20px; border-radius: 16px; color: white;
  }
  .section-title.math { background: linear-gradient(135deg, #FF6B35, #FFD93D); }
  .section-title.lang { background: linear-gradient(135deg, #A855F7, #EC4899); }
  .section-title.riddle { background: linear-gradient(135deg, #4ECDC4, #22C55E); }
  .section-title.logic { background: linear-gradient(135deg, #3B82F6, #8B5CF6); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 10px; }

  .card {
    background: var(--card); border-radius: 20px; padding: 22px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.07); border: 2px solid transparent;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    position: relative; overflow: hidden;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,0.12); }
  .card.correct { border-color: var(--green); background: #F0FDF4; }
  .card.wrong { border-color: var(--red); background: #FEF2F2; }
  .card.revealed { border-color: var(--blue); background: #F0FDFC; }
  .card-badge { position: absolute; top: 14px; right: 14px; font-size: 1.5rem; opacity: 0.25; }
  .q-num { font-family: 'Baloo 2', cursive; font-size: 0.8rem; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .q-text { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 16px; line-height: 1.5; white-space: pre-line; }

  .options { display: flex; flex-wrap: wrap; gap: 10px; }
  .opt-btn {
    padding: 10px 18px; border-radius: 50px; border: 2.5px solid #E5E7EB;
    background: #F9FAFB; font-family: 'Nunito', sans-serif; font-size: 0.95rem;
    font-weight: 700; cursor: pointer; transition: all 0.18s; color: var(--text);
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--purple); background: #FAF5FF; color: var(--purple); transform: scale(1.04); }
  .opt-btn.correct-opt { background: var(--green); border-color: var(--green); color: white; }
  .opt-btn.wrong-opt { background: var(--red); border-color: var(--red); color: white; }
  .opt-btn:disabled { cursor: default; }

  .fill-wrap { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .fill-input {
    padding: 10px 16px; border-radius: 50px; border: 2.5px solid #E5E7EB;
    font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 700;
    width: 160px; outline: none; transition: border-color 0.2s; color: var(--text);
  }
  .fill-input:focus { border-color: var(--purple); }
  .fill-input.correct-input { border-color: var(--green); background: #F0FDF4; }
  .fill-input.wrong-input { border-color: var(--red); background: #FEF2F2; }

  .check-btn {
    padding: 10px 20px; border-radius: 50px; border: none;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    color: white; font-family: 'Nunito', sans-serif; font-size: 0.95rem;
    font-weight: 700; cursor: pointer; transition: all 0.18s;
    box-shadow: 0 3px 12px rgba(168,85,247,0.3);
  }
  .check-btn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 5px 18px rgba(168,85,247,0.4); }
  .check-btn:disabled { opacity: 0.5; cursor: default; }

  .reveal-btn {
    padding: 10px 20px; border-radius: 50px; border: 2.5px dashed var(--blue);
    background: transparent; color: var(--blue); font-family: 'Nunito', sans-serif;
    font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.18s; margin-top: 4px;
  }
  .reveal-btn:hover { background: #E0FDFC; transform: scale(1.04); }

  .answer-box {
    margin-top: 12px; padding: 12px 16px;
    background: linear-gradient(135deg, #E0FDFC, #D1FAE5);
    border-radius: 12px; font-weight: 700; color: #047857; font-size: 1rem;
    display: none; animation: fadeIn 0.3s;
  }
  .answer-box.show { display: block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none} }

  .feedback { margin-top: 10px; font-size: 0.9rem; font-weight: 700; display: none; animation: fadeIn 0.25s; }
  .feedback.show { display: block; }
  .feedback.ok { color: var(--green); }
  .feedback.no { color: var(--red); }

  .result-section {
    text-align: center; padding: 40px 20px; margin-top: 30px;
    background: white; border-radius: 24px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08); display: none;
  }
  .result-section.show { display: block; animation: fadeIn 0.4s; }
  .result-emoji { font-size: 4rem; margin-bottom: 12px; }
  .result-title {
    font-family: 'Baloo 2', cursive; font-size: 2rem; font-weight: 800;
    background: linear-gradient(135deg,var(--orange),var(--pink));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .result-sub { color: #6B7280; margin-top: 8px; font-size: 1rem; }
  .restart-btn {
    margin-top: 20px; padding: 14px 36px; border-radius: 50px; border: none;
    background: linear-gradient(135deg, var(--orange), var(--pink)); color: white;
    font-family: 'Baloo 2', cursive; font-size: 1.1rem; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 18px rgba(255,107,53,0.35); transition: transform 0.2s;
  }
  .restart-btn:hover { transform: scale(1.06); }

  .submit-wrap { text-align: center; margin-top: 30px; }
  .submit-btn {
    padding: 16px 48px; border-radius: 50px; border: none;
    background: linear-gradient(135deg, #22C55E, #4ECDC4); color: white;
    font-family: 'Baloo 2', cursive; font-size: 1.3rem; font-weight: 700; cursor: pointer;
    box-shadow: 0 5px 22px rgba(34,197,94,0.35); transition: transform 0.2s, box-shadow 0.2s;
  }
  .submit-btn:hover { transform: scale(1.06); box-shadow: 0 8px 30px rgba(34,197,94,0.45); }

  .max-w { max-width: 960px; margin: 0 auto; }

  @media (max-width: 500px) {
    .header h1 { font-size: 1.9rem; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="max-w">
  <div class="header">
    <div class="stars">⭐🌈⭐</div>
    <h1>🎒 Bài Tập Vui Cho Bé</h1>
    <p>Dành cho bé 6–8 tuổi &nbsp;·&nbsp; Cùng học, cùng chơi!</p>
  </div>

  <div class="score-bar">
    <div class="score-item"><span>🏆</span> Điểm của bé:</div>
    <div class="score-item" id="score-display">0</div>
    <div class="score-item" id="total-display">/ 0</div>
    <div class="score-item"><span>✅</span> <span id="correct-count">0</span> đúng</div>
  </div>

  <div class="section-title math">🔢 Phần 1: Toán vui</div>
  <div class="grid" id="math-grid"></div>

  <div class="section-title lang">📝 Phần 2: Ngôn ngữ</div>
  <div class="grid" id="lang-grid"></div>

  <div class="section-title riddle">🔍 Phần 3: Câu đố vui</div>
  <div class="grid" id="riddle-grid"></div>

  <div class="section-title logic">🧩 Phần 4: Tìm quy luật</div>
  <div class="grid" id="logic-grid"></div>

  <div class="submit-wrap">
    <button class="submit-btn" onclick="submitAll()">🎉 Xem kết quả!</button>
  </div>

  <div class="result-section" id="result-section">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-title" id="result-title">Xuất sắc!</div>
    <div class="result-sub" id="result-sub"></div>
    <button class="restart-btn" onclick="restartAll()">🔄 Làm lại</button>
  </div>
</div>

<script>
const mathQuestions = [
  { num:1, badge:'🍎', type:'choice', q:'Có 8 quả táo, em lấy 3 quả.\nCòn lại bao nhiêu quả?', opts:['3','4','5','6'], answer:'5' },
  { num:2, badge:'🐣', type:'choice', q:'Mẹ gà có 12 quả trứng, nở được 7 con.\nCòn bao nhiêu quả chưa nở?', opts:['4','5','6','7'], answer:'5' },
  { num:3, badge:'🚗', type:'choice', q:'Có 4 chiếc xe, mỗi xe có 4 bánh.\nTổng cộng bao nhiêu bánh?', opts:['12','14','16','18'], answer:'16' },
  { num:4, badge:'🌸', type:'fill', q:'Điền số còn thiếu:\n5 + ___ = 13', answer:'8' },
  { num:5, badge:'🎈', type:'choice', q:'Nhà có 3 anh em, mỗi người được 4 cái kẹo.\nCả nhà có bao nhiêu cái kẹo?', opts:['7','10','12','14'], answer:'12' },
  { num:6, badge:'🧁', type:'fill', q:'Điền số còn thiếu:\n20 – ___ = 11', answer:'9' },
];

const langQuestions = [
  { num:1, badge:'🔤', type:'choice', q:'Từ nào là trái nghĩa với "nóng"?', opts:['Ấm','Lạnh','Mát','Nắng'], answer:'Lạnh' },
  { num:2, badge:'🐶', type:'choice', q:'Sắp xếp thành câu đúng:\n"bãi / chó / biển / chạy / trên"', opts:['Chó chạy trên bãi biển.','Biển chạy chó trên bãi.','Trên biển bãi chó chạy.','Chạy chó biển bãi trên.'], answer:'Chó chạy trên bãi biển.' },
  { num:3, badge:'😊', type:'choice', q:'Từ nào đồng nghĩa với "vui vẻ"?', opts:['Buồn','Hạnh phúc','Tức giận','Mệt mỏi'], answer:'Hạnh phúc' },
  { num:4, badge:'✏️', type:'fill', q:'Điền từ còn thiếu:\n"Mặt trời mọc ở phía ___."', answer:'Đông', hint:'(Đông / Tây / Nam / Bắc)' },
  { num:5, badge:'🌿', type:'choice', q:'"Cây xanh" thuộc nhóm nào?', opts:['Động vật','Thực vật','Đồ dùng','Thức ăn'], answer:'Thực vật' },
];

const riddleQuestions = [
  { num:1, badge:'🐾', q:'Con gì có 4 chân, có đuôi,\nhay sủa "gâu gâu"?', answer:'🐶 Con chó!' },
  { num:2, badge:'❄️', q:'Cái gì càng rửa thì càng bẩn?', answer:'💧 Nước! (Nước bẩn sau khi rửa)' },
  { num:3, badge:'☀️', q:'Ban ngày đứng, ban đêm nằm,\nnhưng chẳng phải người là cái gì?', answer:'🪑 Cái ghế!' },
  { num:4, badge:'🌳', q:'Trái cây màu vàng, vỏ cong cong,\nkhỉ rất thích ăn là trái gì?', answer:'🍌 Quả chuối!' },
  { num:5, badge:'🌧️', q:'Không có chân mà vẫn chạy,\nkhông có miệng mà vẫn reo. Đó là gì?', answer:'🌊 Dòng nước / con suối!' },
];

const logicQuestions = [
  { num:1, badge:'🔢', type:'choice', q:'Tìm số còn thiếu:\n2, 4, 6, ___, 10', opts:['7','8','9','11'], answer:'8' },
  { num:2, badge:'🎨', type:'choice', q:'Hình nào KHÁC với các hình còn lại?\n🔵 Tròn   🟥 Vuông   🍎 Táo   🔺 Tam giác', opts:['Tròn','Vuông','Táo','Tam giác'], answer:'Táo' },
  { num:3, badge:'🐾', type:'choice', q:'Con nào KHÔNG phải là chim?\n🐦 Chim sẻ   🦅 Đại bàng   🐧 Chim cánh cụt   🦇 Dơi', opts:['Chim sẻ','Đại bàng','Chim cánh cụt','Dơi'], answer:'Dơi' },
  { num:4, badge:'🔢', type:'fill', q:'Tìm quy luật và điền tiếp:\n3, 6, 9, 12, ___', answer:'15' },
  { num:5, badge:'🎁', type:'choice', q:'An cao hơn Bình, Bình cao hơn Chi.\nAi thấp nhất?', opts:['An','Bình','Chi','Bằng nhau'], answer:'Chi' },
];

let answered = {};
let totalAnswerable = 0;
let correctCount = 0;

function renderChoice(q, containerId, section) {
  totalAnswerable++;
  const id = section+'-'+q.num;
  const div = document.createElement('div');
  div.className = 'card'; div.id = 'card-'+id;
  div.innerHTML = `
    <span class="card-badge">${q.badge}</span>
    <div class="q-num">${section.toUpperCase()} · Câu ${q.num}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">
      ${q.opts.map(o=>`<button class="opt-btn" onclick="checkChoice('${id}','${o.replace(/'/g,"\\'")}','${q.answer.replace(/'/g,"\\'")}',this)">${o}</button>`).join('')}
    </div>
    <div class="feedback" id="fb-${id}"></div>`;
  document.getElementById(containerId).appendChild(div);
}

function renderFill(q, containerId, section) {
  totalAnswerable++;
  const id = section+'-'+q.num;
  const div = document.createElement('div');
  div.className = 'card'; div.id = 'card-'+id;
  div.innerHTML = `
    <span class="card-badge">${q.badge}</span>
    <div class="q-num">${section.toUpperCase()} · Câu ${q.num}</div>
    <div class="q-text">${q.q}${q.hint?`\n<small style="color:#9CA3AF;font-weight:400">${q.hint}</small>`:''}</div>
    <div class="fill-wrap">
      <input class="fill-input" id="inp-${id}" placeholder="Điền đáp án..." onkeydown="if(event.key==='Enter')checkFill('${id}','${q.answer}')"/>
      <button class="check-btn" id="btn-${id}" onclick="checkFill('${id}','${q.answer}')">✓ Kiểm tra</button>
    </div>
    <div class="feedback" id="fb-${id}"></div>`;
  document.getElementById(containerId).appendChild(div);
}

function renderRiddle(q, containerId) {
  const id = 'riddle-'+q.num;
  const div = document.createElement('div');
  div.className = 'card'; div.id = 'card-'+id;
  div.innerHTML = `
    <span class="card-badge">${q.badge}</span>
    <div class="q-num">CÂU ĐỐ · Câu ${q.num}</div>
    <div class="q-text">${q.q}</div>
    <button class="reveal-btn" id="rev-${id}" onclick="revealRiddle('${id}','${q.answer.replace(/'/g,"\\'")}',this)">🔍 Xem đáp án</button>
    <div class="answer-box" id="ans-${id}">💡 ${q.answer}</div>`;
  document.getElementById(containerId).appendChild(div);
}

function checkChoice(id, chosen, correct, btn) {
  if (answered[id]) return;
  answered[id] = true;
  const card = document.getElementById('card-'+id);
  const fb = document.getElementById('fb-'+id);
  card.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent.trim() === correct) b.classList.add('correct-opt');
  });
  if (chosen === correct) {
    btn.classList.add('correct-opt'); card.classList.add('correct');
    fb.textContent = '🎉 Đúng rồi! Bé giỏi quá!'; fb.className = 'feedback show ok';
    correctCount++;
  } else {
    btn.classList.add('wrong-opt'); card.classList.add('wrong');
    fb.textContent = '❌ Chưa đúng! Đáp án là: '+correct; fb.className = 'feedback show no';
  }
  updateScore();
}

function checkFill(id, correct) {
  if (answered[id]) return;
  const inp = document.getElementById('inp-'+id);
  const btn = document.getElementById('btn-'+id);
  const fb = document.getElementById('fb-'+id);
  const card = document.getElementById('card-'+id);
  const val = inp.value.trim();
  if (!val) return;
  answered[id] = true; inp.disabled = true; btn.disabled = true;
  if (val.toLowerCase() === correct.toLowerCase()) {
    inp.classList.add('correct-input'); card.classList.add('correct');
    fb.textContent = '🎉 Đúng rồi! Bé giỏi quá!'; fb.className = 'feedback show ok';
    correctCount++;
  } else {
    inp.classList.add('wrong-input'); card.classList.add('wrong');
    fb.textContent = '❌ Chưa đúng! Đáp án là: '+correct; fb.className = 'feedback show no';
  }
  updateScore();
}

function revealRiddle(id, answer, btn) {
  document.getElementById('ans-'+id).classList.add('show');
  document.getElementById('card-'+id).classList.add('revealed');
  btn.textContent = '✅ Đã xem!'; btn.disabled = true; btn.style.opacity = '0.6';
}

function updateScore() {
  document.getElementById('score-display').textContent = correctCount * 10;
  document.getElementById('correct-count').textContent = correctCount;
}

function submitAll() {
  const pct = totalAnswerable > 0 ? correctCount / totalAnswerable : 0;
  const emoji = document.getElementById('result-emoji');
  const title = document.getElementById('result-title');
  const sub = document.getElementById('result-sub');
  if (pct >= 0.9) { emoji.textContent='🏆'; title.textContent='Xuất sắc! Thiên tài nhỏ!'; }
  else if (pct >= 0.7) { emoji.textContent='🌟'; title.textContent='Giỏi lắm! Cố lên nha!'; }
  else if (pct >= 0.5) { emoji.textContent='😊'; title.textContent='Khá tốt! Luyện thêm nhé!'; }
  else { emoji.textContent='💪'; title.textContent='Cố gắng hơn nhé bé!'; }
  sub.textContent = 'Bé làm đúng '+correctCount+'/'+totalAnswerable+' câu · '+correctCount*10+' điểm';
  const res = document.getElementById('result-section');
  res.classList.add('show');
  res.scrollIntoView({behavior:'smooth',block:'center'});
}

function restartAll() {
  answered = {}; correctCount = 0;
  document.getElementById('score-display').textContent = '0';
  document.getElementById('correct-count').textContent = '0';
  document.getElementById('result-section').classList.remove('show');
  ['math-grid','lang-grid','riddle-grid','logic-grid'].forEach(id => document.getElementById(id).innerHTML='');
  totalAnswerable = 0;
  init();
}

function init() {
  mathQuestions.forEach(q => q.type==='choice' ? renderChoice(q,'math-grid','toan') : renderFill(q,'math-grid','toan'));
  langQuestions.forEach(q => q.type==='choice' ? renderChoice(q,'lang-grid','ngon-ngu') : renderFill(q,'lang-grid','ngon-ngu'));
  riddleQuestions.forEach(q => renderRiddle(q,'riddle-grid'));
  logicQuestions.forEach(q => q.type==='choice' ? renderChoice(q,'logic-grid','logic') : renderFill(q,'logic-grid','logic'));
  document.getElementById('total-display').textContent = '/ '+(totalAnswerable*10);
}
init();
</script>
</body>
</html>
