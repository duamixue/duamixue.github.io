<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕐 Xem Giờ – Kim Giây – Siêu Khó</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;700;900&display=swap');

  :root {
    --bg: #0a0f1e;
    --card: #111827;
    --accent1: #fbbf24;
    --accent2: #f472b6;
    --accent3: #34d399;
    --accent4: #ef4444;
    --correct: #10b981;
    --wrong: #ef4444;
    --text: #f1f5f9;
    --sub: #64748b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 15% 15%, #1e3a5f22 0%, transparent 55%),
      radial-gradient(ellipse at 85% 85%, #3b0764 0%, transparent 55%),
      radial-gradient(ellipse at 50% 0%, #0f172a 0%, transparent 80%);
    z-index: -2;
  }

  /* ─── Stars ─── */
  .stars { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
  .star {
    position: absolute; background: white; border-radius: 50%;
    animation: tw 2.5s infinite alternate ease-in-out;
  }
  @keyframes tw { from{opacity:.15;transform:scale(1)} to{opacity:.95;transform:scale(1.4)} }

  /* ─── Header ─── */
  header { text-align: center; padding: 28px 20px 16px; }
  .badge {
    display: inline-block;
    background: linear-gradient(120deg, #fbbf24, #ef4444);
    border-radius: 50px; padding: 5px 18px;
    font-size: 12px; font-weight: 800; letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 10px;
  }
  h1 {
    font-family: 'Baloo 2', cursive; font-size: clamp(30px, 6.5vw, 54px);
    font-weight: 800;
    background: linear-gradient(130deg, #fbbf24 0%, #f472b6 45%, #34d399 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1.15; margin-bottom: 8px;
  }
  .subtitle { color: var(--sub); font-size: 16px; font-weight: 600; }

  /* ─── Legend ─── */
  .legend {
    display: flex; justify-content: center; gap: 20px;
    flex-wrap: wrap; padding: 12px 20px 4px;
  }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 15px; font-weight: 600; color: var(--sub); }
  .legend-line {
    width: 28px; height: 4px; border-radius: 4px;
  }

  /* ─── Progress ─── */
  .progress-wrap { max-width: 580px; margin: 14px auto 6px; padding: 0 20px; }
  .progress-info { display: flex; justify-content: space-between; font-size: 15px; font-weight: 700; color: var(--sub); margin-bottom: 8px; }
  .progress-bar { height: 9px; background: rgba(255,255,255,.08); border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #fbbf24, #f472b6); border-radius: 10px; transition: width .5s ease; width: 0%; }

  /* ─── Score strip ─── */
  .score-strip { display: flex; justify-content: center; gap: 12px; max-width: 580px; margin: 10px auto 16px; padding: 0 16px; }
  .score-box {
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
    border-radius: 14px; padding: 12px 16px; text-align: center; flex: 1;
  }
  .score-box .val { font-family: 'Baloo 2', cursive; font-size: 30px; font-weight: 800; line-height: 1; }
  .score-box .lbl { font-size: 12px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }
  .vc { color: var(--correct); } .vw { color: var(--wrong); } .vq { color: var(--accent1); }

  /* ─── Dot row ─── */
  .dot-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-bottom: 16px; padding: 0 20px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,.13); transition: background .3s; }
  .dot.ok { background: var(--correct); }
  .dot.no { background: var(--wrong); }
  .dot.cur { background: var(--accent1); box-shadow: 0 0 8px var(--accent1); }

  /* ─── Card ─── */
  .card { max-width: 580px; margin: 0 auto; padding: 0 16px 48px; }
  .question-card {
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.09);
    border-radius: 28px; padding: 28px 24px 24px;
    text-align: center;
    backdrop-filter: blur(12px);
    animation: slideIn .4s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

  .q-label { font-size: 13px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
  .q-task {
    font-family: 'Baloo 2', cursive; font-size: 22px; font-weight: 700;
    color: var(--accent1); margin-bottom: 4px;
  }

  .clock-wrap { display: flex; justify-content: center; margin: 18px 0 24px; }

  /* ─── Answers ─── */
  .answers { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .ans-btn {
    background: rgba(255,255,255,.07);
    border: 2px solid rgba(255,255,255,.13);
    border-radius: 15px; padding: 17px 8px;
    font-family: 'Baloo 2', cursive; font-size: 23px; font-weight: 700;
    color: var(--text); cursor: pointer; transition: all .2s ease; line-height: 1.3;
  }
  .ans-btn small { display: block; font-size: 13px; font-weight: 500; color: var(--sub); font-family: 'Nunito', sans-serif; }
  .ans-btn:hover:not(:disabled) {
    background: rgba(255,255,255,.12); border-color: var(--accent1);
    transform: translateY(-2px); box-shadow: 0 8px 20px rgba(251,191,36,.2);
  }
  .ans-btn.correct { background: rgba(16,185,129,.2); border-color: var(--correct); color: var(--correct); animation: popG .4s ease; }
  .ans-btn.wrong   { background: rgba(239,68,68,.15);  border-color: var(--wrong);   color: var(--wrong);   animation: shk .4s ease; }
  .ans-btn:disabled { cursor: default; }

  @keyframes popG { 0%{transform:scale(1)} 50%{transform:scale(1.06)} 100%{transform:scale(1)} }
  @keyframes shk  { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  /* ─── Feedback ─── */
  .feedback {
    margin-top: 16px; min-height: 44px; display: flex; align-items: center;
    justify-content: center; gap: 6px; font-size: 18px; font-weight: 700;
    border-radius: 13px; padding: 12px 14px; opacity: 0; transition: opacity .3s;
  }
  .feedback.show { opacity: 1; }
  .feedback.ok { background: rgba(16,185,129,.14); color: var(--correct); }
  .feedback.no { background: rgba(239,68,68,.12);  color: var(--wrong); }

  /* ─── Next ─── */
  .next-btn {
    display: block; width: 100%; margin-top: 14px; padding: 17px;
    background: linear-gradient(135deg, #fbbf24, #f472b6);
    border: none; border-radius: 15px;
    font-family: 'Baloo 2', cursive; font-size: 19px; font-weight: 700;
    color: white; cursor: pointer; opacity: 0; pointer-events: none; transition: all .3s;
  }
  .next-btn.show { opacity: 1; pointer-events: auto; animation: popIn .3s ease; }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(251,191,36,.35); }
  @keyframes popIn { from{transform:scale(.92)} to{transform:scale(1)} }

  /* ─── Result ─── */
  .result-screen { display: none; max-width: 560px; margin: 0 auto; padding: 0 16px 60px; text-align: center; }
  .result-screen.show { display: block; animation: slideIn .5s ease; }
  .trophy { font-size: 80px; margin-bottom: 14px; animation: bop 1s infinite alternate; }
  @keyframes bop { from{transform:translateY(0)} to{transform:translateY(-12px)} }
  .result-title {
    font-family: 'Baloo 2', cursive; font-size: 38px; font-weight: 800;
    background: linear-gradient(135deg, #fbbf24, #f472b6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 8px;
  }
  .result-sub { color: var(--sub); font-size: 17px; font-weight: 600; margin-bottom: 28px; }
  .result-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 28px; }
  .stat-box {
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.09);
    border-radius: 18px; padding: 18px 10px;
  }
  .stat-box .num { font-family: 'Baloo 2', cursive; font-size: 40px; font-weight: 800; line-height: 1; }
  .stat-box .txt { font-size: 13px; font-weight: 700; color: var(--sub); margin-top: 4px; }
  .restart-btn {
    display: inline-block; padding: 17px 38px;
    background: linear-gradient(135deg, #fbbf24, #f472b6);
    border: none; border-radius: 50px;
    font-family: 'Baloo 2', cursive; font-size: 20px; font-weight: 700;
    color: white; cursor: pointer; transition: all .2s;
  }
  .restart-btn:hover { transform: scale(1.05); box-shadow: 0 14px 36px rgba(251,191,36,.4); }

  /* ─── Confetti ─── */
  .confetti-piece {
    position: fixed; top: -20px; pointer-events: none; z-index: 999; border-radius: 2px;
    animation: fall linear forwards;
  }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<header>
  <div class="badge">⭐ Cấp độ khó</div>
  <h1>🕐 Xem Giờ – Kim Giây</h1>
  <p class="subtitle">24 câu · Giờ : Phút : Giây</p>
</header>

<!-- Legend -->
<div class="legend">
  <div class="legend-item">
    <div class="legend-line" style="background:#fbbf24;height:6px"></div>
    <span>Kim giờ</span>
  </div>
  <div class="legend-item">
    <div class="legend-line" style="background:#60a5fa"></div>
    <span>Kim phút</span>
  </div>
  <div class="legend-item">
    <div class="legend-line" style="background:#ef4444;height:2px"></div>
    <span>Kim giây</span>
  </div>
</div>

<!-- Progress -->
<div class="progress-wrap">
  <div class="progress-info">
    <span id="prog-text">Câu 1 / 24</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
</div>

<!-- Score -->
<div class="score-strip">
  <div class="score-box"><div class="val vq" id="sc-q">1</div><div class="lbl">Câu số</div></div>
  <div class="score-box"><div class="val vc" id="sc-ok">0</div><div class="lbl">Đúng</div></div>
  <div class="score-box"><div class="val vw" id="sc-no">0</div><div class="lbl">Sai</div></div>
</div>

<!-- Dots -->
<div class="dot-row" id="dot-row"></div>

<!-- Quiz area -->
<div class="card" id="quiz-area">
  <div class="question-card" id="qcard">
    <div class="q-label" id="q-label">Câu 1</div>
    <div class="q-task" id="q-task">Đồng hồ đang chỉ mấy giờ?</div>
    <div class="clock-wrap">
      <canvas id="clockCanvas" width="240" height="240"></canvas>
    </div>
    <div class="answers" id="answers"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Câu tiếp theo →</button>
  </div>
</div>

<!-- Result -->
<div class="result-screen" id="result-screen">
  <div class="trophy" id="trophy">🏆</div>
  <div class="result-title" id="r-title">Xuất sắc!</div>
  <div class="result-sub" id="r-sub">Bé đọc giờ siêu đỉnh!</div>
  <div class="result-stats">
    <div class="stat-box"><div class="num vc" id="r-ok">0</div><div class="txt">✅ Đúng</div></div>
    <div class="stat-box"><div class="num vw" id="r-no">0</div><div class="txt">❌ Sai</div></div>
    <div class="stat-box"><div class="num" style="color:#34d399" id="r-pct">0%</div><div class="txt">🎯 Tỉ lệ</div></div>
  </div>
  <button class="restart-btn" onclick="restart()">🔄 Chơi lại</button>
</div>

function playRewardMusic(){
  if(firstAnswerDone) return;
  firstAnswerDone=true;
  let playCount=0;
  const audio=new Audio(REWARD_AUDIO_SRC);
  audio.addEventListener('ended', ()=>{
    playCount++;
    if(playCount<2){ audio.currentTime=0; audio.play().catch(()=>{}); }
  });
  audio.play().catch(()=>{}); // trình duyệt có thể chặn tự phát tới khi có tương tác, nhưng đây là do bé bấm nên luôn được phép
}

// ── Stars ──
(()=>{
  const w=document.getElementById('stars');
  for(let i=0;i<70;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*2.2+.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${1.8+Math.random()*3}s;animation-delay:${Math.random()*4}s`;
    w.appendChild(s);
  }
})();

// ── Dots ──
function buildDots(){
  const row=document.getElementById('dot-row');
  row.innerHTML='';
  for(let i=0;i<24;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===0?' cur':'');
    d.id='d'+i; row.appendChild(d);
  }
}
buildDots();

// ── Format helpers ──
const p2=n=>String(n).padStart(2,'0');
function fmtFull(h,m,s){ return `${h}:${p2(m)}:${p2(s)}`; }
function fmtHM(h,m){ return `${h}:${p2(m)}`; }

// ── Draw clock on canvas ──
function drawClock(h,m,s){
  const canvas=document.getElementById('clockCanvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const cx=W/2, cy=H/2, R=104;
  ctx.clearRect(0,0,W,H);

  // Outer glow ring
  const grad=ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,'#fbbf24'); grad.addColorStop(1,'#f472b6');
  ctx.beginPath(); ctx.arc(cx,cy,R+7,0,Math.PI*2);
  ctx.strokeStyle=grad; ctx.lineWidth=3; ctx.stroke();

  // Face
  const face=ctx.createRadialGradient(cx-20,cy-20,5,cx,cy,R);
  face.addColorStop(0,'#1e293b'); face.addColorStop(1,'#0a0f1e');
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.fillStyle=face; ctx.fill();

  // Tick marks
  for(let i=0;i<60;i++){
    const a=(i/60)*Math.PI*2 - Math.PI/2;
    const isMaj=i%5===0;
    const r1=isMaj?R-16:R-9;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*r1, cy+Math.sin(a)*r1);
    ctx.lineTo(cx+Math.cos(a)*(R-3), cy+Math.sin(a)*(R-3));
    ctx.strokeStyle=isMaj?'#e2e8f0':'#334155';
    ctx.lineWidth=isMaj?2.5:1;
    ctx.lineCap='round'; ctx.stroke();
  }

  // Hour numbers
  ctx.font='bold 15px Baloo 2, cursive';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle='#cbd5e1';
  for(let i=1;i<=12;i++){
    const a=(i/12)*Math.PI*2 - Math.PI/2;
    const nr=R-28;
    ctx.fillText(i, cx+Math.cos(a)*nr, cy+Math.sin(a)*nr);
  }

  // ── Hour hand ──
  const hAngle=((h%12)+m/60+s/3600)/12*Math.PI*2 - Math.PI/2;
  drawHand(ctx,cx,cy,hAngle,57,7,'#fbbf24');

  // ── Minute hand ──
  const mAngle=(m/60+s/3600)*Math.PI*2 - Math.PI/2;
  drawHand(ctx,cx,cy,mAngle,79,4,'#60a5fa');

  // ── Second hand ──
  const sAngle=(s/60)*Math.PI*2 - Math.PI/2;
  // tail
  ctx.beginPath();
  ctx.moveTo(cx+Math.cos(sAngle+Math.PI)*20, cy+Math.sin(sAngle+Math.PI)*20);
  ctx.lineTo(cx+Math.cos(sAngle)*90, cy+Math.sin(sAngle)*90);
  ctx.strokeStyle='#ef4444'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.stroke();

  // Center cap
  ctx.beginPath(); ctx.arc(cx,cy,8,0,Math.PI*2);
  ctx.fillStyle='#f472b6'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2);
  ctx.fillStyle='white'; ctx.fill();
}

function drawHand(ctx,cx,cy,angle,len,width,color){
  const tail=14;
  ctx.beginPath();
  ctx.moveTo(cx+Math.cos(angle+Math.PI)*tail, cy+Math.sin(angle+Math.PI)*tail);
  ctx.lineTo(cx+Math.cos(angle)*len, cy+Math.sin(angle)*len);
  ctx.strokeStyle=color; ctx.lineWidth=width;
  ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
}

// ── Generate wrong answers ──
function genOptions(q, type){
  const answer=getAnswer(q,type);
  const wrongPool=new Set(); // chỉ chứa đáp án SAI, đáp án đúng được thêm riêng ở cuối

  function addWrong(s){ if(s!==answer) wrongPool.add(s); }

  if(type==='A'||type==='C'){
    // vary minutes ±5, ±10
    for(const dm of [-10,-5,5,10,15,-15]){
      if(wrongPool.size>=7) break;
      const nm=(q.m+dm+60)%60;
      addWrong(type==='A' ? fmtFull(q.h,nm,q.s) : fmtHM(q.h,nm));
    }
    // vary hours
    for(const dh of [1,-1,2]){
      if(wrongPool.size>=7) break;
      const nh=((q.h-1+dh+12)%12)+1;
      addWrong(type==='A' ? fmtFull(nh,q.m,q.s) : fmtHM(nh,q.m));
    }
    // vary seconds (type A only)
    if(type==='A'){
      for(const ds of [-15,15,-30,30]){
        if(wrongPool.size>=7) break;
        const ns=((q.s+ds)%60+60)%60;
        addWrong(fmtFull(q.h,q.m,ns));
      }
    }
  } else { // type B – seconds only
    for(const ds of [-15,-10,-5,5,10,15,20,-20,25,30]){
      if(wrongPool.size>=7) break;
      const ns=((q.s+ds)%60+60)%60;
      addWrong(p2(ns)+' giây');
    }
  }

  // Fill up to 3 đáp án sai nếu chưa đủ
  while(wrongPool.size<3){
    const rh=Math.ceil(Math.random()*12), rm=Math.floor(Math.random()*60), rs=Math.floor(Math.random()*12)*5;
    const s = type==='A'?fmtFull(rh,rm,rs): type==='C'?fmtHM(rh,rm): p2(rs)+' giây';
    addWrong(s);
  }

  // Đáp án đúng luôn có mặt: chọn ngẫu nhiên 3 đáp án sai rồi trộn cùng đáp án đúng
  const chosenWrongs=shuffle([...wrongPool]).slice(0,3);
  return shuffle([answer, ...chosenWrongs]);
}


function getAnswer(q,type){
  if(type==='A') return fmtFull(q.h,q.m,q.s);
  if(type==='C') return fmtHM(q.h,q.m);
  return p2(q.s)+' giây';
}

function getTask(type){
  if(type==='A') return '🕰️ Xem giờ : phút : giây';
  if(type==='C') return '⏰ Xem giờ : phút';
  return '⏱️ Kim giây chỉ số mấy?';
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

// ── Render ──
function render(){
  answered=false;
  const q=QUESTIONS[current], type=TASK_TYPES[current];

  document.getElementById('q-label').textContent=`Câu ${current+1}`;
  document.getElementById('q-task').textContent=getTask(type);
  document.getElementById('prog-text').textContent=`Câu ${current+1} / 24`;
  const pct=Math.round(current/24*100);
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('sc-q').textContent=current+1;
  document.getElementById('sc-ok').textContent=correct;
  document.getElementById('sc-no').textContent=wrong;

  // dots
  for(let i=0;i<24;i++){
    const d=document.getElementById('d'+i);
    if(d&&i===current){ d.className='dot cur'; }
  }

  drawClock(q.h,q.m,q.s);

  const answer=getAnswer(q,type);
  const opts=genOptions(q,type);

  const wrap=document.getElementById('answers');
  wrap.innerHTML='';
  opts.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='ans-btn';
    btn.textContent=opt;
    btn.onclick=()=>check(btn,opt,answer);
    wrap.appendChild(btn);
  });

  document.getElementById('feedback').className='feedback';
  document.getElementById('feedback').textContent='';
  document.getElementById('next-btn').className='next-btn';
  const qcard=document.getElementById('qcard');
  qcard.style.animation='none';
  requestAnimationFrame(()=>{ qcard.style.animation='slideIn .4s ease'; });
}

function check(btn,chosen,answer){
  if(answered) return;
  answered=true;
  playRewardMusic();
  document.querySelectorAll('.ans-btn').forEach(b=>{ b.disabled=true; if(b.textContent===answer) b.classList.add('correct'); });
  const fb=document.getElementById('feedback');
  if(chosen===answer){
    correct++;
    btn.classList.add('correct');
    fb.className='feedback show ok';
    fb.textContent='🌟 Chính xác!';
    confetti();
    document.getElementById('d'+current).className='dot ok';
  } else {
    wrong++;
    btn.classList.add('wrong');
    fb.className='feedback show no';
    fb.textContent=`❌ Sai! Đáp án đúng: ${answer}`;
    document.getElementById('d'+current).className='dot no';
  }
  document.getElementById('sc-ok').textContent=correct;
  document.getElementById('sc-no').textContent=wrong;
  document.getElementById('next-btn').className='next-btn show';
}

function nextQuestion(){
  current++;
  if(current>=24){ showResult(); return; }
  render();
}

function showResult(){
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('dot-row').style.display='none';
  const rs=document.getElementById('result-screen');
  rs.classList.add('show');
  const pct=Math.round(correct/24*100);
  document.getElementById('r-ok').textContent=correct;
  document.getElementById('r-no').textContent=wrong;
  document.getElementById('r-pct').textContent=pct+'%';
  let tr='🏆',ti='Xuất sắc!',su='Kết quả rất tốt!';
  if(pct>=90){tr='🥇';ti='Thiên tài!';su='Gần như tuyệt đối!';}
  else if(pct>=70){tr='🥈';ti='Rất giỏi!';su='Cố thêm chút là hoàn hảo!';}
  else if(pct>=50){tr='🥉';ti='Tốt lắm!';su='Luyện thêm kim giây nhé!';}
  else{tr='📚';ti='Cần luyện thêm!';su='Thử lại lần nữa nhé!';}
  document.getElementById('trophy').textContent=tr;
  document.getElementById('r-title').textContent=ti;
  document.getElementById('r-sub').textContent=su;
  if(pct>=70) for(let i=0;i<6;i++) setTimeout(confetti,i*350);
}

function restart(){
  current=0; correct=0; wrong=0;
  document.getElementById('quiz-area').style.display='block';
  document.getElementById('dot-row').style.display='flex';
  document.getElementById('result-screen').classList.remove('show');
  buildDots();
  render();
}

function confetti(){
  const colors=['#fbbf24','#f472b6','#34d399','#60a5fa','#a78bfa','#fb923c'];
  for(let i=0;i<16;i++){
    const c=document.createElement('div'); c.className='confetti-piece';
    const sz=7+Math.random()*8;
    c.style.cssText=`left:${10+Math.random()*80}%;width:${sz}px;height:${sz}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>.5?'50%':'2px'};
      animation-duration:${1.4+Math.random()*1.4}s;
      animation-delay:${Math.random()*0.3}s;`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}

render();
</script>
