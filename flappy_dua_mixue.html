<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Dừa & Mixue</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{overscroll-behavior:none;overflow:hidden;touch-action:none}
  body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif}
  canvas{display:block;border-radius:12px;box-shadow:0 0 60px rgba(100,200,255,0.2);touch-action:none}
  #gameWrap{position:relative}
  #controls{display:flex;gap:10px;margin-top:14px}
  #musicBtn,#pauseBtn,#restartBtn,#settingsBtn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);color:#fff;padding:8px 18px;border-radius:20px;cursor:pointer;font-size:13px;letter-spacing:.05em;transition:background .2s}
  #musicBtn:hover,#pauseBtn:hover,#restartBtn:hover,#settingsBtn:hover{background:rgba(255,255,255,0.2)}
  #pauseBtn{display:none}
  #restartBtn{display:none}
  #settingsBtn{display:none}
  #settingsOverlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(10,10,20,0.6);border-radius:12px}
  #settingsOverlay.show{display:flex}
  .settings-box{background:linear-gradient(180deg,#ffe8a0,#f5c840);border:3px solid #b08020;border-radius:14px;padding:20px 22px;text-align:center;min-width:250px;max-width:90%}
  .settings-box h2{color:#7b4f00;font-size:19px;margin-bottom:12px;letter-spacing:.05em}
  .settings-box .group-label{color:#8b6800;font-size:12px;margin:12px 0 6px;text-align:left;font-weight:bold}
  .skin-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .skin-swatch{width:42px;height:42px;border-radius:50%;border:3px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;background:#eee}
  .skin-swatch.active{border-color:#3a2000;box-shadow:0 0 0 2px #ffe8a0}
  .diff-row{display:flex;gap:6px;justify-content:center}
  .diff-btn{flex:1;padding:8px 4px;border:none;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer;background:#e8cf8a;color:#5c3d00}
  .diff-btn.active{background:#3a2000;color:#ffe8a0}
  .settings-box .close-btn{display:block;width:100%;margin-top:16px;padding:10px;border:none;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;background:#3a2000;color:#ffe8a0}
  .settings-box .close-btn:hover{background:#54300a}
  #pauseOverlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(10,10,20,0.55);border-radius:12px}
  #pauseOverlay.show{display:flex}
  .pause-box{background:linear-gradient(180deg,#ffe8a0,#f5c840);border:3px solid #b08020;border-radius:14px;padding:26px 32px;text-align:center;min-width:220px}
  .pause-box h2{color:#7b4f00;font-size:22px;margin-bottom:18px;letter-spacing:.05em}
  .pause-box button{display:block;width:100%;margin-top:10px;padding:10px;border:none;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;background:#3a2000;color:#ffe8a0}
  .pause-box button:hover{background:#54300a}
</style>
</head>
<body>
<div id="gameWrap">
<canvas id="c"></canvas>
<div id="pauseOverlay">
  <div class="pause-box">
    <h2>⏸ TẠM DỪNG</h2>
    <button id="resumeBtn">▶ Tiếp tục</button>
    <button id="restartFromPauseBtn">🔄 Chơi lại</button>
  </div>
</div>
<div id="settingsOverlay">
  <div class="settings-box">
    <h2>⚙️ Cài đặt</h2>
    <div class="group-label">NHÂN VẬT</div>
    <div class="skin-row" id="skinRow"></div>
    <div class="group-label">ĐỘ KHÓ</div>
    <div class="diff-row" id="diffRow"></div>
    <button class="close-btn" id="settingsCloseBtn">Xong ✅</button>
  </div>
</div>
</div>
<div id="controls">
<button id="musicBtn">🔇 Bật nhạc</button>
<button id="pauseBtn">⏸ Tạm dừng</button>
<button id="restartBtn">🔄 Chơi lại</button>
<button id="settingsBtn">⚙️ Cài đặt</button>
</div>

// --- Hiệu ứng âm thanh ngắn (Web Audio API, không cần file ngoài) ---
let actx;
function beep(freq, dur, type='sine', vol=0.18, delay=0){
  try{
    if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
    const t0 = actx.currentTime + delay;
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(vol, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    osc.connect(gain); gain.connect(actx.destination);
    osc.start(t0); osc.stop(t0 + dur);
  }catch(e){}
}
function sfxFlap(){ beep(520, 0.09, 'square', 0.10); }
function sfxScore(){ beep(880, 0.10, 'triangle', 0.16); beep(1180, 0.12, 'triangle', 0.14, 0.06); }
function sfxHit(){ beep(160, 0.28, 'sawtooth', 0.22); beep(90, 0.32, 'square', 0.16, 0.05); }

function reset(){
  const d = DIFFICULTIES[difficulty];
  bird={x:80,y:H/2-30,vy:0,angle:0,squish:1,squishV:0};
  pipes=[];score=0;frameCount=0;deathTimer=0;state='idle';
  pipeSpeed=d.speedBase;pipeGap=d.gapBase;shakeTime=0;
}
reset();

// Độ khó tăng dần theo điểm: ống nhanh hơn & khe hẹp hơn, có giới hạn để vẫn chơi được
function updateDifficulty(){
  const d = DIFFICULTIES[difficulty];
  pipeSpeed = Math.min(d.speedMax, d.speedBase + score*d.speedRamp);
  pipeGap = Math.max(d.gapMin, d.gapBase - score*d.gapRamp);
}

function flap(){
  if(state==='paused') return;
  if(state==='dead'){ if(deathTimer>40) reset(); return; }
  if(state==='idle')state='playing';
  bird.vy=FLAP;bird.squish=0.65;bird.squishV=0.06;
  sfxFlap();
}

function buildSkinRow(){
  skinRow.innerHTML = '';
  SKINS.forEach(s => {
    const b = document.createElement('button');
    b.className = 'skin-swatch' + (s.id===skinId ? ' active' : '');
    b.textContent = s.swatch;
    b.title = s.name;
    b.addEventListener('click', () => {
      skinId = s.id;
      localStorage.setItem('flappyBoySkin', skinId);
      buildSkinRow();
    });
    skinRow.appendChild(b);
  });
}
function buildDiffRow(){
  diffRow.innerHTML = '';
  Object.keys(DIFFICULTIES).forEach(key => {
    const b = document.createElement('button');
    b.className = 'diff-btn' + (key===difficulty ? ' active' : '');
    b.textContent = DIFFICULTIES[key].label;
    b.addEventListener('click', () => {
      difficulty = key;
      localStorage.setItem('flappyBoyDifficulty', difficulty);
      buildDiffRow();
    });
    diffRow.appendChild(b);
  });
}
buildSkinRow();buildDiffRow();

document.body.addEventListener('touchmove', e => e.preventDefault(), {passive:false});

function spawnPipe(){const min=60,max=SKY_H-pipeGap-60;pipes.push({x:W+PIPE_W,topH:min+Math.random()*(max-min),gap:pipeGap,scored:false});}
function birdRect(){return{x:bird.x-14,y:bird.y-14,w:28,h:28};}
function collides(r,rx,ry,rw,rh){return r.x<rx+rw&&r.x+r.w>rx&&r.y<ry+rh&&r.y+r.h>ry;}

function update(){
  frameCount++;
  bird.squish+=(1-bird.squish)*0.2+bird.squishV;bird.squishV*=0.7;
  bird.squish=Math.min(1.3,Math.max(0.6,bird.squish));
  if(state==='playing'){
    updateDifficulty();
    bird.vy+=GRAVITY;bird.y+=bird.vy;
    bird.angle=Math.max(-30,Math.min(85,bird.vy*4));
    if(frameCount%PIPE_SPAWN===0)spawnPipe();
    for(const p of pipes)p.x-=pipeSpeed;
    pipes=pipes.filter(p=>p.x>-PIPE_W-10);
    for(const p of pipes)if(!p.scored&&p.x+PIPE_W<bird.x){p.scored=true;score++;sfxScore();if(score>best){best=score;localStorage.setItem('flappyBoyBest',best);}}
    const br=birdRect();
    if(bird.y+16>=SKY_H){bird.y=SKY_H-16;die();return;}
    if(bird.y-16<=0){die();return;}
    for(const p of pipes)if(collides(br,p.x,0,PIPE_W,p.topH)||collides(br,p.x,p.topH+p.gap,PIPE_W,SKY_H)){die();return;}
  }
  if(state==='idle'){bird.y=H/2-30+Math.sin(frameCount*.07)*7;bird.angle=0;}
  if(state==='dead'){deathTimer++;bird.vy+=GRAVITY*.8;bird.y+=bird.vy;bird.y=Math.min(bird.y,SKY_H-16);}
}
function die(){state='dead';bird.vy=FLAP*.5;sfxHit();shakeTime=16;}

const skyGrad=ctx.createLinearGradient(0,0,0,SKY_H);
skyGrad.addColorStop(0,'#1a6fa8');skyGrad.addColorStop(.5,'#38b6e8');skyGrad.addColorStop(1,'#7dd6f5');
const clouds=Array.from({length:5},(_,i)=>({x:40+i*75,y:30+Math.random()*80,w:50+Math.random()*40,speed:.3+Math.random()*.2}));

function drawCloud(c){
  ctx.fillStyle='rgba(255,255,255,0.82)';
  ctx.beginPath();ctx.ellipse(c.x,c.y,c.w*.5,c.w*.22,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(c.x-c.w*.2,c.y+4,c.w*.32,c.w*.18,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(c.x+c.w*.2,c.y+4,c.w*.35,c.w*.18,0,0,Math.PI*2);ctx.fill();
}

function drawPipe(p){
  const capH=22,cap=5;
  function seg(x,y,w,h,isTop){
    const g=ctx.createLinearGradient(x,0,x+w,0);
    g.addColorStop(0,'#2ecc71');g.addColorStop(.4,'#58d98a');g.addColorStop(1,'#1a7a43');
    ctx.fillStyle=g;ctx.strokeStyle='#155c30';ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(x,y+(isTop?0:capH),w,h-capH,isTop?[4,4,0,0]:[0,0,4,4]);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.roundRect(x-cap,y+(isTop?h-capH:0),w+cap*2,capH,6);ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(x+8,y+(isTop?0:capH),10,h-capH);
  }
  seg(p.x,0,PIPE_W,p.topH,true);
  seg(p.x,p.topH+p.gap,PIPE_W,SKY_H-(p.topH+p.gap),false);
}

function drawGround(){
  const g=ctx.createLinearGradient(0,SKY_H,0,H);
  g.addColorStop(0,'#d4a843');g.addColorStop(.3,'#c49530');g.addColorStop(1,'#9b7320');
  ctx.fillStyle=g;ctx.fillRect(0,SKY_H,W,GROUND_H);
  ctx.fillStyle='#5cb85c';ctx.fillRect(0,SKY_H,W,14);
  ctx.fillStyle='#4cae4c';ctx.fillRect(0,SKY_H,W,7);
  ctx.fillStyle='rgba(255,255,255,0.1)';
  for(let x=0;x<W;x+=20)ctx.fillRect(x,SKY_H+22,12,4);
}

const R=26;
function drawBird(){
  ctx.save();
  ctx.translate(bird.x,bird.y);
  ctx.rotate(bird.angle*Math.PI/180);
  ctx.scale(2-bird.squish,bird.squish);

  // Shadow
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=10;ctx.shadowOffsetY=4;
  ctx.beginPath();ctx.arc(0,0,R,0,Math.PI*2);
  ctx.fillStyle='#000';ctx.fill();
  ctx.restore();

  // Clip & draw face / skin
  const skin = SKINS.find(s=>s.id===skinId) || SKINS[0];
  ctx.save();
  ctx.beginPath();ctx.arc(0,0,R,0,Math.PI*2);ctx.clip();
  if(skin.type==='photo'){
    const img = photoImgs[skin.id];
    if(img&&img.complete&&img.naturalWidth>0){
      ctx.drawImage(img,-R,-R,R*2,R*2);
    } else {
      ctx.fillStyle='#ffe033';ctx.fillRect(-R,-R,R*2,R*2);
    }
  } else {
    const bg=ctx.createLinearGradient(-R,-R,R,R);
    bg.addColorStop(0,skin.color);bg.addColorStop(1,skin.accent);
    ctx.fillStyle=bg;ctx.fillRect(-R,-R,R*2,R*2);
    // cánh
    ctx.fillStyle='rgba(255,255,255,0.28)';
    ctx.beginPath();ctx.ellipse(-3,5,R*0.5,R*0.3,0.35,0,Math.PI*2);ctx.fill();
    // bụng sáng
    ctx.fillStyle='rgba(255,255,255,0.18)';
    ctx.beginPath();ctx.ellipse(0,R*0.35,R*0.65,R*0.4,0,0,Math.PI*2);ctx.fill();
    // mắt
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(R*0.32,-R*0.28,R*0.22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#2b2b2b';
    ctx.beginPath();ctx.arc(R*0.38,-R*0.28,R*0.11,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
  if(skin.type!=='photo'){
    // mỏ (vẽ ngoài phần clip để nhô ra)
    ctx.fillStyle='#ff9f1c';ctx.strokeStyle='#c9720a';ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(R*0.72,-4);ctx.lineTo(R*1.28,3);ctx.lineTo(R*0.72,10);
    ctx.closePath();ctx.fill();ctx.stroke();
  }

  // Gold border glow
  ctx.beginPath();ctx.arc(0,0,R,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,230,50,0.95)';ctx.lineWidth=3;
  ctx.shadowColor='rgba(255,220,50,0.9)';ctx.shadowBlur=14;
  ctx.stroke();ctx.shadowBlur=0;

  // Flap sparkles
  if(bird.squish<0.78){
    ['⭐','✨','⭐'].forEach((s,i)=>{
      const a=(-0.7+i*0.7)*Math.PI;
      ctx.font='11px serif';ctx.fillStyle='#ffe033';ctx.textAlign='center';
      ctx.fillText(s,Math.cos(a)*(R+11),Math.sin(a)*(R+8)-3);
    });
  }
  ctx.restore();
}

function drawScore(){
  ctx.save();ctx.textAlign='center';
  ctx.font='bold 46px "Segoe UI"';
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillText(score,W/2+2,64);
  ctx.fillStyle='#fff';ctx.fillText(score,W/2,62);
  ctx.restore();
}

function roundBox(x,y,w,h,r,fill,stroke){
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=3;ctx.stroke();}
}

function easeOutBack(x){const c1=1.70158,c3=c1+1;return 1+c3*Math.pow(x-1,3)+c1*Math.pow(x-1,2);}

function drawPanel(title,sub){
  const animT=Math.min(1,Math.max(0,(deathTimer-40)/18));
  const eased=easeOutBack(animT);
  ctx.save();
  ctx.globalAlpha=Math.min(1,animT/0.5);
  ctx.translate(W/2,H/2);ctx.scale(eased,eased);ctx.translate(-W/2,-H/2);
  const pw=264,ph=200,px=(W-pw)/2,py=H/2-ph/2;
  roundBox(px+4,py+4,pw,ph,14,'rgba(0,0,0,0.3)');
  const pg=ctx.createLinearGradient(px,py,px,py+ph);
  pg.addColorStop(0,'#ffe8a0');pg.addColorStop(1,'#f5c840');
  roundBox(px,py,pw,ph,14,pg,'#b08020');
  roundBox(px+6,py+6,pw-12,ph-12,10,null,'rgba(255,255,255,0.5)');
  ctx.textAlign='center';
  ctx.font='bold 26px "Segoe UI"';ctx.fillStyle='#7b4f00';ctx.fillText(title,W/2,py+42);
  ctx.font='14px "Segoe UI"';ctx.fillStyle='#8b6800';
  ctx.fillText('ĐIỂM',W/2-52,py+78);ctx.fillText('KỶ LỤC',W/2+52,py+78);
  ctx.font='bold 34px "Segoe UI Mono"';ctx.fillStyle='#3a2000';
  ctx.fillText(score,W/2-52,py+116);ctx.fillText(best,W/2+52,py+116);
  ctx.strokeStyle='#c09020';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(px+20,py+128);ctx.lineTo(px+pw-20,py+128);ctx.stroke();
  ctx.font='15px "Segoe UI"';ctx.fillStyle='#7b4f00';ctx.fillText(sub,W/2,py+152);
  ctx.font='13px "Segoe UI"';ctx.fillStyle='#a07030';ctx.fillText('Chạm / Space để chơi lại',W/2,py+178);
  ctx.restore();
}

function drawIdle(){
  ctx.textAlign='center';
  ctx.font='bold 50px "Segoe UI"';
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillText('FLAPPY',W/2+2,H/2-100);
  ctx.fillStyle='#ffe033';ctx.strokeStyle='#e67e00';ctx.lineWidth=4;
  ctx.strokeText('FLAPPY',W/2,H/2-102);ctx.fillText('FLAPPY',W/2,H/2-102);
  ctx.font='bold 25px "Segoe UI"';
  ctx.fillStyle='#ff6b6b';ctx.strokeStyle='#900';ctx.lineWidth=2;
  const title2='DỪA & MIXUE';
  ctx.strokeText(title2,W/2,H/2-64);ctx.fillText(title2,W/2,H/2-64);
  if(mixueLogo.complete&&mixueLogo.naturalWidth>0){
    const lh=58,lw=lh*(mixueLogo.naturalWidth/mixueLogo.naturalHeight);
    ctx.drawImage(mixueLogo,W/2-lw/2,H/2-46,lw,lh);
  }
  ctx.font='17px "Segoe UI"';ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=3;
  const hint='Chạm hoặc Space để bay ✈️';
  ctx.strokeText(hint,W/2,H/2+105);ctx.fillText(hint,W/2,H/2+105);
}

function drawWatermark(){
  ctx.save();
  ctx.textAlign='right';
  ctx.font='11px "Segoe UI"';
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText('© HMPP',W-8,H-8);
  ctx.restore();
}

let tabVisible = true;
document.addEventListener('visibilitychange', () => {
  tabVisible = !document.hidden;
  if(!tabVisible && state==='playing') audio.pause();
  else if(tabVisible && musicOn) audio.play().catch(()=>{});
});

function syncControls(){
  pauseBtn.style.display = (state==='playing') ? 'inline-block' : 'none';
  restartBtn.style.display = (state==='dead' && deathTimer>40) ? 'inline-block' : 'none';
  settingsBtn.style.display = (state==='idle' || state==='dead') ? 'inline-block' : 'none';
}

function loop(){
  if(tabVisible) update(); // dừng vật lý khi tab bị ẩn, tránh chim "nhảy cóc" xuyên ống lúc quay lại
  ctx.save();
  if(shakeTime>0){
    const t=shakeTime/16;
    ctx.translate((Math.random()*2-1)*9*t,(Math.random()*2-1)*9*t);
    shakeTime--;
  }
  ctx.fillStyle=skyGrad;ctx.fillRect(-20,-20,W+40,H+40);
  for(const c of clouds){if(state==='playing'){c.x-=c.speed;if(c.x<-c.w)c.x=W+c.w;}drawCloud(c);}
  for(const p of pipes)drawPipe(p);
  drawGround();
  drawBird();
  ctx.restore();
  if(state==='playing'||state==='paused')drawScore();
  if(state==='idle')drawIdle();
  if(state==='dead'&&deathTimer>40)drawPanel('GAME OVER',score>0&&score===best?'🎉 Kỷ lục mới! Xuất sắc!':'Cố lên nào bé ơi! 💪');
  drawWatermark();
  syncControls();
  requestAnimationFrame(loop);
}
loop();
</script>
